<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tr('Better Media v2')</title>
  <link rel="icon" type="image/svg+xml" href="resources/icon.svg">

  <!-- Behavior options. Each one becomes a setting in the widget's iCUE
       panel. The widget reads them via globalThis.<name>. We poll those
       globals on the same tick as the host fetches and dispatch onChange
       when a value actually moved. None of these drive paint — they
       affect logic (polling cadence, lyric visibility, sync offset).
       Appearance options are deliberately NOT here yet — they're being
       added back in a later flicker-isolation step. -->
  <meta name="x-icue-property" content="pollIntervalMs"
        data-label="tr('Polling Interval (ms)')"
        data-type="slider"
        data-default="1500"
        data-min="500"
        data-max="5000"
        data-step="100">

  <meta name="x-icue-property" content="autoExpand"
        data-label="tr('Auto-expand to listening view when idle')"
        data-type="switch"
        data-default="true">

  <meta name="x-icue-property" content="autoExpandAfterSec"
        data-label="tr('Idle delay before expanding (seconds)')"
        data-type="slider"
        data-default="30"
        data-min="10"
        data-max="120"
        data-step="5">

  <meta name="x-icue-property" content="showLyrics"
        data-label="tr('Show synced lyrics in listening view')"
        data-type="switch"
        data-default="true">

  <meta name="x-icue-property" content="lyricSyncOffsetMs"
        data-label="tr('Lyric sync offset (ms)')"
        data-type="slider"
        data-default="0"
        data-min="-2000"
        data-max="2000"
        data-step="50">

  <script id="x-icue-groups" type="application/json">
    [
      { "title": "tr('Behavior')", "properties": ["pollIntervalMs", "autoExpand", "autoExpandAfterSec", "showLyrics", "lyricSyncOffsetMs"] }
    ]
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0c;
      color: #fff;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout switches between two flex orientations based on aspect ratio.
       The classes (.size-wide / .size-vertical) are toggled by JS via a
       ResizeObserver on .root — iCUE's QtWebEngine doesn't reliably fire
       window.resize when the cell changes on the dashboard, so we observe
       the element directly. Width-based breakpoints fail on Xeneon Edge
       because Small horizontal (840×344) and Medium horizontal (840×696)
       share width 840 with very different shapes — aspect ratio cleanly
       separates "wide strip" from "square/tall". */
    .root {
      position: relative;
      isolation: isolate;       /* contain the .art-bg negative z-index */
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      overflow: hidden;         /* clip the bg blur halo to the cell */
    }

    /* FLICKER TEST: re-introducing the album-art bg layer the way it
       was in phase 8 — heavy filter chain (blur + brightness + saturate)
       on an <img> whose src mirrors the foreground album art. If the
       random flicker on the Edge comes back here, this is confirmed
       the cause. Always shown (no iCUE option toggle) to isolate the
       layer itself from the option-pipeline plumbing.
       The .show class is toggled by setArt based on hasArt — when
       there's no track, the bg fades out instead of showing a broken
       image. */
    .art-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(36px) brightness(0.45) saturate(1.15);
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      transition: opacity 350ms ease;
    }
    .art-bg.show { opacity: 0.95; }
    .root.size-wide {
      flex-direction: row;
      justify-content: flex-start;
    }
    .root.size-vertical {
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    /* Art — same element, scales differently per layout. */
    .art {
      flex: 0 0 auto;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      object-fit: cover;
      background: #1c1c22;
      display: block;
    }
    .root.size-wide .art {
      height: 100%;
      max-height: 100%;
      width: auto;
    }
    .root.size-vertical .art {
      width: min(28vmin, 140px);
    }
    .art.empty { visibility: hidden; }

    /* Content column on the right in wide mode, full width in vertical.
       flex:1 1 0 lets the lyrics inside it actually take available space
       in wide mode without overflowing.
       justify-content: flex-start anchors title/artist/source at the top.
       The bottom group (.progress + .transport + .phase) is pushed to the
       bottom by margin-top: auto on .progress. When lyrics ARE rendered,
       they fill the gap as flex:1; when they're not, .progress's auto
       margin still keeps the bottom row pinned down rather than letting
       everything collapse to the middle. */
    .content {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-self: stretch;
      justify-content: flex-start;
    }
    .root.size-vertical .content {
      align-items: center;
    }

    .text {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 0 0 auto;
    }
    .title {
      font-size: clamp(16px, 3.5vmin, 26px);
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .artist {
      font-size: clamp(12px, 2.4vmin, 18px);
      font-weight: 500;
      opacity: 0.75;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Source line under artist — shows "Spotify · Album" when SMTC reports
       Spotify, hidden otherwise (no flex room reserved when empty). */
    .source {
      font-size: 11px;
      letter-spacing: 0.02em;
      opacity: 0.6;
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      margin-top: 2px;
    }
    .root.size-vertical .source { justify-content: center; }
    .source.empty { display: none; }
    .source .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1db954;
      flex-shrink: 0;
    }
    .source .name {
      font-weight: 700;
      color: #1db954;
    }
    .source .album {
      opacity: 0.85;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* Up-next line — shows the head of the Spotify queue when authed.
       Hidden via display:none when no queue (so it doesn't reserve a
       blank row in the layout). Sits between source line and lyrics. */
    .upnext {
      font-size: 11px;
      letter-spacing: 0.02em;
      opacity: 0.55;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }
    .upnext.empty { display: none; }
    .upnext .label {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #1db954;
      margin-right: 6px;
    }

    /* Library modal — full-cell overlay with a scrollable playlist
       list. Triggered by the lib button when Spotify is authed. */
    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      width: 100%;
      max-width: 600px;
      max-height: 100%;
      background: #15151a;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex: 0 0 auto;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      flex: 1 1 auto;
    }
    .modal-action {
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms;
      flex: 0 0 auto;
    }
    .modal-action:hover, .modal-action:active { background: rgba(255, 255, 255, 0.13); }
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    .modal-list {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-list::-webkit-scrollbar { width: 6px; }
    .modal-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .modal-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border: none;
      background: none;
      color: #fff;
      width: 100%;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 80ms;
    }
    .modal-row:hover, .modal-row:active { background: rgba(255, 255, 255, 0.06); }
    .modal-row .pl-art {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      background: #2a2a32;
      flex: 0 0 auto;
    }
    .modal-row .pl-meta {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .modal-row .pl-name {
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .modal-row .pl-count {
      font-size: 11px;
      opacity: 0.55;
    }
    .modal-empty {
      padding: 30px 18px;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }

    /* Lyrics — fixed-position viewport, inner track translates via transform.
       (See phase 6.1 commit message for the full rationale on why this
       avoids the scrollTo preemption flicker.) */
    .lyrics {
      position: relative;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      font-size: clamp(13px, 2.4vmin, 18px);
      line-height: 1.5;
    }
    /* Top/bottom fade overlays were using a hardcoded #0a0a0c page-bg
       color, which doubled as a darker rectangle on top of the album-art
       bg layer (visible "double-applied" border around the lyrics). The
       lyric lines already fade visually via opacity (.35 default,
       1 current) and overflow:hidden clips lines past the viewport, so
       the gradient overlays were cosmetic and now actively unhelpful.
       Removed. */
    .lyrics .track {
      transform: translateY(0);
      transition: transform 350ms cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
      padding: 50% 0;
      box-sizing: border-box;
    }
    .lyrics .line {
      padding: 4px 8px;
      opacity: 0.35;
      color: #fff;
      transition: opacity 250ms, color 250ms;
    }
    .root.size-vertical .lyrics .line { text-align: center; }
    .lyrics .line.past { opacity: 0.4; }
    .lyrics .line.current {
      opacity: 1;
      color: #1db954;
      font-weight: 700;
    }
    .lyrics.empty { display: none; }
    .lyrics-fallback {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.06em;
      opacity: 0.4;
    }
    .lyrics-fallback.hidden { display: none; }

    /* Progress bar — first element of the "bottom group". margin-top: auto
       eats whatever vertical slack is left in .content, pushing this and
       everything below it (.transport, .phase) to the bottom of the column.
       When lyrics ARE rendered as flex:1, the lyrics take the slack first
       and this margin contributes nothing. When lyrics are absent, the
       margin keeps progress + transport + status pinned to the bottom
       instead of collapsing toward the middle. */
    .progress {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
      flex: 0 0 auto;
      margin-top: auto;
    }
    .progress .track {
      height: 4px;
      background: #2a2a32;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress .fill {
      position: absolute;
      inset: 0;
      background: #1db954;
      transform-origin: left center;
      transform: scaleX(0);
      will-change: transform;
    }
    .progress .times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      opacity: 0.6;
    }

    /* Transport — spans the full content width. Buttons are spread evenly
       so the row visually balances regardless of how wide the content
       column ends up (wide-strip vs vertical). */
    .transport {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      width: 100%;
      justify-content: space-between;
    }
    .t-btn {
      flex: 1 1 0;
      min-width: 0;
      height: clamp(44px, 7.5vmin, 60px);
      border-radius: 999px;
      border: none;
      background: #1c1c22;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 80ms;
    }
    .t-btn:hover { background: #2a2a32; }
    .t-btn:active { background: #2a2a32; }
    .t-btn:disabled { opacity: 0.3; cursor: default; }
    .t-btn svg {
      width: 30%;
      max-width: 24px;
      max-height: 24px;
      pointer-events: none;
      fill: currentColor;
    }
    .t-btn.center {
      background: #1db954;
      color: #08130c;
    }
    /* Connect/Playlists slot — Spotify-green tinted to match the source
       chip color, but a subtler treatment than the play button. */
    .t-btn.lib {
      color: #1db954;
    }

    .phase {
      font-size: 11px;
      letter-spacing: 0.08em;
      opacity: 0.45;
      text-transform: uppercase;
      flex: 0 0 auto;
    }
    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1db954;
      margin-right: 8px;
      vertical-align: middle;
      transition: opacity 200ms;
      opacity: 0.25;
    }
    .pulse.live { opacity: 1; }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <main class="root size-vertical" id="root">
    <img class="art-bg" id="artBg" alt="" aria-hidden="true">
    <img class="art empty" id="art" alt="">
    <div class="content">
      <div class="text">
        <div class="title" id="title">Connecting…</div>
        <div class="artist" id="artist"></div>
        <div class="source empty" id="source">
          <span class="dot" aria-hidden="true"></span>
          <span class="name">Spotify</span>
          <span aria-hidden="true">·</span>
          <span class="album" id="sourceAlbum"></span>
        </div>
        <div class="upnext empty" id="upnext"><span class="label">Up next</span><span id="upnextText"></span></div>
      </div>
      <div class="lyrics empty" id="lyrics"></div>
      <div class="lyrics-fallback hidden" id="lyricsFallback">no synced lyrics</div>
      <div class="progress">
        <div class="track"><div class="fill" id="fill"></div></div>
        <div class="times"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
      </div>
      <div class="transport">
        <button class="t-btn" id="prevBtn" type="button" aria-label="Previous track" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 5h2v14H6zM10 12l9-7v14z"/>
          </svg>
        </button>
        <button class="t-btn center" id="toggleBtn" type="button" aria-label="Play" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true" id="toggleIcon">
            <path d="M7 5l13 7-13 7z"/>
          </svg>
        </button>
        <button class="t-btn" id="nextBtn" type="button" aria-label="Next track" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5l9 7-9 7zM16 5h2v14h-2z"/>
          </svg>
        </button>
        <!-- Slot 4: Playlists when authed, Connect when not. Same shape so
             the layout doesn't shift when auth flips. id stays stable;
             we swap the inner SVG + aria-label + click handler. -->
        <button class="t-btn lib" id="libBtn" type="button" aria-label="Connect Spotify">
          <svg viewBox="0 0 24 24" aria-hidden="true" id="libIcon">
            <!-- Default = Spotify wordmark icon (Connect) -->
            <circle cx="12" cy="12" r="10"/>
            <path d="M16.7 16.5c-.2.3-.6.4-.9.2-2.5-1.5-5.6-1.9-9.3-1-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 4-.9 7.5-.5 10.3 1.2.3.2.4.6.2.9zm1.2-2.7c-.2.4-.7.5-1.1.3-2.8-1.7-7.1-2.2-10.5-1.2-.4.1-.9-.1-1-.6-.1-.4.1-.9.6-1 3.8-1.2 8.5-.6 11.7 1.4.4.2.5.7.3 1.1zm.1-2.8C14.9 9 9.4 8.7 6.2 9.7c-.5.2-1.1-.1-1.2-.6-.2-.5.1-1.1.6-1.2 3.7-1.1 9.7-.9 13.4 1.3.5.3.6.9.4 1.4-.3.4-.9.6-1.4.4z" fill="#0a0a0c"/>
          </svg>
        </button>
      </div>
      <div class="phase">
        <span class="pulse" id="pulse"></span><span id="status">media v2</span>
      </div>
    </div>

    <!-- Library modal — full-cell overlay shown when the lib button is
         tapped while authed. Click on the backdrop OR the close button
         dismisses it; click on a row plays that playlist via the host
         and dismisses. Hidden by default. -->
    <div class="modal-backdrop hidden" id="libModal" role="dialog" aria-modal="true" aria-label="Library">
      <div class="modal" id="libModalCard">
        <div class="modal-header">
          <span class="modal-title">Library</span>
          <button class="modal-action" id="libModalDisconnect" type="button" aria-label="Disconnect Spotify">Disconnect</button>
          <button class="modal-close" id="libModalClose" type="button" aria-label="Close">×</button>
        </div>
        <div class="modal-list" id="libModalList">
          <div class="modal-empty" id="libModalEmpty">No playlists yet — give it a moment.</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    // Phase 7 goal: aspect-ratio responsive layout. ResizeObserver toggles
    // .size-wide vs .size-vertical on the root element. Same DOM, just two
    // flex orientations. Layout calculation is async and frame-batched, so
    // the lyrics translateY math (which reads lyricsEl.clientHeight) keeps
    // working — clientHeight reflects the actual rendered viewport.

    const HOST = 'http://127.0.0.1:8976';
    const TICK_MS = 200;
    const SEEK_THRESHOLD_FORWARD = 2500;
    const SEEK_THRESHOLD_BACKWARD = 2000;
    // Poll cadence is now an iCUE option (Behavior > Polling Interval).
    let pollIntervalMs = 1500;
    let pollTimer = null;
    function startPollTimer() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => { pollOnce(); pollIcueOptions(); }, pollIntervalMs);
    }

    // ---- iCUE option sync framework -------------------------------------
    // Two delivery paths from iCUE → us:
    //   1. icueEvents.onDataUpdated fires on user setting changes (event-
    //      based path; immediate response).
    //   2. Polling the globals every poll tick as a fallback for QtWebEngine
    //      builds that drop the event.
    // Reading the global also has a quirk: some builds inject the property
    // as a `var` that globalThis[name] can't see (script-context vs window).
    // The Function() eval trick resolves the identifier through the scope
    // chain. Adding a new option = one register call.
    const icueOptions = [];
    function readIcueOption(name, defaultValue) {
      const w = globalThis;
      if (Object.prototype.hasOwnProperty.call(w, name)) {
        const v = w[name];
        if (v !== undefined && v !== null && v !== '') return v;
      }
      try {
        const v = Function('return typeof ' + name + ' !== "undefined" ? ' + name + ' : undefined')();
        if (v !== undefined && v !== null && v !== '') return v;
      } catch { /* not defined */ }
      return defaultValue;
    }
    function registerIcueOption(name, defaultValue, onChange) {
      const initial = readIcueOption(name, defaultValue);
      icueOptions.push({ name, defaultValue, last: initial, onChange });
      onChange(initial);
    }
    function pollIcueOptions() {
      for (const entry of icueOptions) {
        const cur = readIcueOption(entry.name, entry.defaultValue);
        if (cur !== entry.last) {
          entry.last = cur;
          entry.onChange(cur);
        }
      }
    }
    // Bare assignment to globalThis on purpose — the runtime bridge uses
    // property descriptors that don't see lexically-scoped declarations,
    // so the handlers must live directly on the global object.
    globalThis.icueEvents = {
      onICUEInitialized: () => pollIcueOptions(),
      onDataUpdated: () => pollIcueOptions(),
    };
    if (globalThis.iCUE_initialized) {
      pollIcueOptions();
    }

    // Live snapshots of each Behavior option. The auto-expand pair is
    // parked here until the listening-mode phase lands — registering them
    // now keeps the iCUE settings panel in sync with v1's layout.
    let optShowLyrics = true;
    let optLyricSyncOffsetMs = 0;
    // eslint-disable-next-line no-unused-vars -- consumed in a future phase
    let optAutoExpand = true;
    // eslint-disable-next-line no-unused-vars -- consumed in a future phase
    let optAutoExpandAfterSec = 30;

    // Spotify state — populated by the slow Spotify poll. Up-next is the
    // head of the queue; library is the user's playlists. Refreshed every
    // SPOTIFY_SLOW_MS (cheap to ask the host, but every miss past its
    // 30-min cache hits the actual Spotify API and risks 429, so don't
    // hammer).
    const SPOTIFY_QUEUE_MS = 6000;
    const SPOTIFY_PLAYLISTS_MS = 600000;   // 10 minutes
    let spotifyQueue = [];
    let spotifyPlaylists = [];
    let lastUpnextText = '';
    let queueTimer = null;
    let playlistsTimer = null;
    // Aspect-ratio threshold separating wide-strip from square/tall.
    // Edge cell aspect ratios from the kit:
    //   Small horizontal:  840×344 = 2.44 → wide
    //   Medium horizontal: 840×696 = 1.21 → vertical
    //   Large horizontal:  1688×696 = 2.43 → wide
    //   X-Large horizontal:2536×696 = 3.64 → wide
    //   Small vertical:    696×416 = 1.67 → vertical
    //   Medium vertical:   696×840 = 0.83 → vertical
    //   Large vertical:    696×1688 = 0.41 → vertical
    //   X-Large vertical:  696×2536 = 0.27 → vertical
    // 2.0 cleanly separates the four wide cells from the four other ones.
    const WIDE_ASPECT_THRESHOLD = 2.0;

    const rootEl = document.getElementById('root');
    const artEl = document.getElementById('art');
    const artBgEl = document.getElementById('artBg');
    const upnextEl = document.getElementById('upnext');
    const upnextTextEl = document.getElementById('upnextText');
    const libModalEl = document.getElementById('libModal');
    const libModalCardEl = document.getElementById('libModalCard');
    const libModalCloseEl = document.getElementById('libModalClose');
    const libModalDisconnectEl = document.getElementById('libModalDisconnect');
    const libModalListEl = document.getElementById('libModalList');
    const libModalEmptyEl = document.getElementById('libModalEmpty');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const sourceEl = document.getElementById('source');
    const sourceAlbumEl = document.getElementById('sourceAlbum');
    const lyricsEl = document.getElementById('lyrics');
    const lyricsFallbackEl = document.getElementById('lyricsFallback');
    const prevBtn = document.getElementById('prevBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const nextBtn = document.getElementById('nextBtn');
    const libBtn = document.getElementById('libBtn');
    const toggleIcon = document.getElementById('toggleIcon');
    const libIcon = document.getElementById('libIcon');
    const fillEl = document.getElementById('fill');
    const curTimeEl = document.getElementById('curTime');
    const totTimeEl = document.getElementById('totTime');
    const pulseEl = document.getElementById('pulse');
    const statusEl = document.getElementById('status');

    const PLAY_PATH = 'M7 5l13 7-13 7z';
    const PAUSE_PATH = 'M6 5h4v14H6zM14 5h4v14h-4z';

    let lastTitle = null;
    let lastArtist = null;
    let lastArtVersion = -1;
    let lastHasArt = null;
    let lastIsPlaying = null;
    let lastCanPrev = null;
    let lastCanNext = null;
    let lastCanToggle = null;
    let lastCurTime = null;
    let lastTotTime = null;
    let lastFillRatio = -1;
    let lastSourceVisible = null;     // bool: should the source line show?
    let lastSourceAlbum = null;       // string we last wrote to .album
    let lastLibMode = null;           // 'connect' | 'playlists'
    let pulseTimeout = null;

    let anchorPosMs = 0;
    let anchorAt = 0;
    let durationMs = 0;
    let isPlaying = false;
    let lastTrackKey = '';
    let spotifyAuthed = false;

    let parsedLyrics = [];
    let lyricLineEls = [];
    let lyricsTrackEl = null;
    let currentLineIdx = -1;
    let lyricsFetchKey = '';
    // Most-recent track metadata. Tracked separately from lyricsFetchKey
    // so the showLyrics toggle can call fetchLyricsFor on the *current*
    // track without waiting for the next track-change to trigger it.
    let currentArtist = '';
    let currentTitle = '';
    let currentAlbum = '';

    const inFlight = { prev: false, toggle: false, next: false };

    // --- Layout: aspect-ratio observer ----------------------------------
    let lastIsWide = null;
    function applyLayout(width, height) {
      if (width <= 0 || height <= 0) return;
      const aspect = width / height;
      const isWide = aspect >= WIDE_ASPECT_THRESHOLD;
      if (isWide === lastIsWide) return;
      lastIsWide = isWide;
      rootEl.classList.toggle('size-wide', isWide);
      rootEl.classList.toggle('size-vertical', !isWide);
      // After a layout swap, the lyrics viewport height changes — re-apply
      // the current line's translateY so it stays centered.
      if (lyricsTrackEl && currentLineIdx >= 0 && lyricLineEls[currentLineIdx]) {
        const lineEl = lyricLineEls[currentLineIdx];
        const containerH = lyricsEl.clientHeight;
        const lineCenter = lineEl.offsetTop + lineEl.offsetHeight / 2;
        const offset = containerH / 2 - lineCenter;
        // Disable transition for the layout-swap snap so it doesn't
        // animate from the old position.
        const prevTransition = lyricsTrackEl.style.transition;
        lyricsTrackEl.style.transition = 'none';
        lyricsTrackEl.style.transform = 'translateY(' + offset.toFixed(1) + 'px)';
        requestAnimationFrame(() => {
          if (lyricsTrackEl) lyricsTrackEl.style.transition = prevTransition;
        });
      }
    }
    new ResizeObserver(entries => {
      for (const entry of entries) {
        applyLayout(entry.contentRect.width, entry.contentRect.height);
      }
    }).observe(rootEl);
    applyLayout(rootEl.clientWidth, rootEl.clientHeight);

    function setText(el, value) {
      if (el.textContent !== value) el.textContent = value;
    }

    function setArt(hasArt, version) {
      if (hasArt && version !== lastArtVersion) {
        const url = HOST + '/api/media/album-art?v=' + version;
        artEl.src = url;
        // Mirror the same URL into the bg layer. Browser caches the
        // decoded bitmap once, both <img>s share it — no extra fetch.
        artBgEl.src = url;
        lastArtVersion = version;
      }
      if (hasArt !== lastHasArt) {
        artEl.classList.toggle('empty', !hasArt);
        lastHasArt = hasArt;
        // Show/hide the bg layer in lockstep with the foreground art.
        artBgEl.classList.toggle('show', hasArt);
      }
    }

    function setToggleState(playing, canToggle) {
      if (playing !== lastIsPlaying) {
        toggleIcon.firstElementChild.setAttribute('d', playing ? PAUSE_PATH : PLAY_PATH);
        toggleBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        lastIsPlaying = playing;
      }
      if (canToggle !== lastCanToggle) {
        toggleBtn.disabled = !canToggle;
        lastCanToggle = canToggle;
      }
    }

    function setBtnEnabled(btn, enabled, lastVar) {
      if (enabled !== lastVar) btn.disabled = !enabled;
      return enabled;
    }

    // Source line — shows "Spotify · <album>" under the artist when SMTC
    // reports Spotify is the source. Hidden otherwise (no flex room).
    function setSource(isSpotify, album) {
      const visible = !!isSpotify;
      if (visible !== lastSourceVisible) {
        sourceEl.classList.toggle('empty', !visible);
        lastSourceVisible = visible;
      }
      if (!visible) return;
      const a = album || '';
      if (a !== lastSourceAlbum) {
        sourceAlbumEl.textContent = a;
        lastSourceAlbum = a;
      }
    }

    // Library/Connect slot. Authed → Playlists icon (opens library — wired
    // up later), unauthed → Spotify wordmark (initiates OAuth). Same button
    // element so layout doesn't shift on the auth flip.
    const PLAYLISTS_SVG =
      '<line x1="8" y1="6" x2="21" y2="6"/>' +
      '<line x1="8" y1="12" x2="21" y2="12"/>' +
      '<line x1="8" y1="18" x2="21" y2="18"/>' +
      '<line x1="3" y1="6" x2="3.01" y2="6"/>' +
      '<line x1="3" y1="12" x2="3.01" y2="12"/>' +
      '<line x1="3" y1="18" x2="3.01" y2="18"/>';
    const CONNECT_SVG =
      '<circle cx="12" cy="12" r="10"/>' +
      '<path d="M16.7 16.5c-.2.3-.6.4-.9.2-2.5-1.5-5.6-1.9-9.3-1-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 4-.9 7.5-.5 10.3 1.2.3.2.4.6.2.9zm1.2-2.7c-.2.4-.7.5-1.1.3-2.8-1.7-7.1-2.2-10.5-1.2-.4.1-.9-.1-1-.6-.1-.4.1-.9.6-1 3.8-1.2 8.5-.6 11.7 1.4.4.2.5.7.3 1.1zm.1-2.8C14.9 9 9.4 8.7 6.2 9.7c-.5.2-1.1-.1-1.2-.6-.2-.5.1-1.1.6-1.2 3.7-1.1 9.7-.9 13.4 1.3.5.3.6.9.4 1.4-.3.4-.9.6-1.4.4z" fill="#0a0a0c"/>';
    function setLibMode(authed) {
      const mode = authed ? 'playlists' : 'connect';
      if (mode === lastLibMode) return;
      lastLibMode = mode;
      if (authed) {
        libIcon.innerHTML = PLAYLISTS_SVG;
        libIcon.setAttribute('fill', 'none');
        libIcon.setAttribute('stroke', 'currentColor');
        libIcon.setAttribute('stroke-width', '2');
        libIcon.setAttribute('stroke-linecap', 'round');
        libIcon.setAttribute('stroke-linejoin', 'round');
        libBtn.setAttribute('aria-label', 'Open Playlists');
      } else {
        libIcon.innerHTML = CONNECT_SVG;
        libIcon.setAttribute('fill', 'currentColor');
        libIcon.removeAttribute('stroke');
        libIcon.removeAttribute('stroke-width');
        libIcon.removeAttribute('stroke-linecap');
        libIcon.removeAttribute('stroke-linejoin');
        libBtn.setAttribute('aria-label', 'Connect Spotify');
      }
    }

    function flashPulse() {
      pulseEl.classList.add('live');
      if (pulseTimeout) clearTimeout(pulseTimeout);
      pulseTimeout = setTimeout(() => pulseEl.classList.remove('live'), 250);
    }

    async function postAction(path, key) {
      if (inFlight[key]) return;
      inFlight[key] = true;
      try { await fetch(HOST + path, { method: 'POST' }); }
      catch { /* surfaced by next poll's status */ }
      finally { inFlight[key] = false; }
    }

    prevBtn.addEventListener('click', () => postAction('/api/media/previous', 'prev'));
    toggleBtn.addEventListener('click', () => postAction('/api/media/toggle', 'toggle'));
    nextBtn.addEventListener('click', () => postAction('/api/media/next', 'next'));
    libBtn.addEventListener('click', async () => {
      if (lastLibMode === 'connect') {
        // POST /api/spotify/connect — host opens the user's default browser
        // to the Spotify auth URL via the betterxeneonwidget:// scheme.
        try { await fetch(HOST + '/api/spotify/connect', { method: 'POST' }); }
        catch { /* surfaced by next poll's status */ }
      } else {
        // Authed: open the Library modal.
        openLibraryModal();
      }
    });

    // --- Up-next renderer + Spotify queue/playlists pollers --------------
    function setUpnext(text) {
      const v = text || '';
      if (v === lastUpnextText) return;
      lastUpnextText = v;
      if (v) {
        upnextTextEl.textContent = v;
        upnextEl.classList.remove('empty');
      } else {
        upnextEl.classList.add('empty');
      }
    }

    async function pollSpotifyQueue() {
      if (!spotifyAuthed) { setUpnext(''); return; }
      try {
        const r = await fetch(HOST + '/api/spotify/queue');
        if (!r.ok) return;
        const data = await r.json();
        spotifyQueue = Array.isArray(data) ? data : [];
        if (spotifyQueue.length > 0) {
          const t = spotifyQueue[0];
          setUpnext((t.title || '') + (t.artist ? ' — ' + t.artist : ''));
        } else {
          setUpnext('');
        }
      } catch { /* non-fatal */ }
    }

    async function pollSpotifyPlaylists() {
      if (!spotifyAuthed) { spotifyPlaylists = []; renderLibraryList(); return; }
      try {
        const r = await fetch(HOST + '/api/spotify/playlists');
        if (!r.ok) return;
        const data = await r.json();
        spotifyPlaylists = Array.isArray(data) ? data : [];
        // Only re-render the modal list if it's currently open — otherwise
        // we'll lazy-render on next open.
        if (!libModalEl.classList.contains('hidden')) renderLibraryList();
      } catch { /* non-fatal */ }
    }

    // --- Library modal ---------------------------------------------------
    async function playPlaylist(id) {
      try { await fetch(HOST + '/api/spotify/playlists/' + encodeURIComponent(id) + '/play', { method: 'POST' }); }
      catch { /* surfaced by next poll's status */ }
    }

    function renderLibraryList() {
      // Build via DocumentFragment to avoid N appendChild reflows. Each
      // playlist row is a <button> so it's keyboard-and-touch friendly.
      const frag = document.createDocumentFragment();
      for (const pl of spotifyPlaylists) {
        const row = document.createElement('button');
        row.className = 'modal-row';
        row.type = 'button';
        const img = document.createElement('img');
        img.className = 'pl-art';
        img.alt = '';
        if (pl.albumArtUrl) img.src = pl.albumArtUrl;
        const meta = document.createElement('div');
        meta.className = 'pl-meta';
        const name = document.createElement('div');
        name.className = 'pl-name';
        name.textContent = pl.name || 'Untitled';
        const count = document.createElement('div');
        count.className = 'pl-count';
        count.textContent = (pl.trackCount || 0) + ' tracks';
        meta.appendChild(name);
        meta.appendChild(count);
        row.appendChild(img);
        row.appendChild(meta);
        row.addEventListener('click', () => {
          if (pl.id) playPlaylist(pl.id);
          closeLibraryModal();
        });
        frag.appendChild(row);
      }
      libModalListEl.textContent = '';
      if (spotifyPlaylists.length === 0) {
        libModalListEl.appendChild(libModalEmptyEl);
      } else {
        libModalListEl.appendChild(frag);
      }
    }

    function openLibraryModal() {
      libModalEl.classList.remove('hidden');
      // Refresh whenever opened — Spotify rate-limits hard, so the host
      // serves cached most of the time anyway.
      pollSpotifyPlaylists();
      renderLibraryList();
    }
    function closeLibraryModal() {
      libModalEl.classList.add('hidden');
    }
    libModalCloseEl.addEventListener('click', closeLibraryModal);
    libModalEl.addEventListener('click', e => {
      // Click on the backdrop (not the card) closes the modal.
      if (e.target === libModalEl) closeLibraryModal();
    });
    libModalDisconnectEl.addEventListener('click', async () => {
      // Tell the host to drop the stored token. The widget's next poll
      // will see connected:false within ~1.5s and the auth-flip handler
      // will swap the lib button back to Connect, clear the up-next, etc.
      try { await fetch(HOST + '/api/spotify/disconnect', { method: 'POST' }); }
      catch { /* surfaced by next poll */ }
      closeLibraryModal();
    });

    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m + ':' + (r < 10 ? '0' : '') + r;
    }

    function currentPosition() {
      if (anchorAt === 0) return 0;
      const elapsed = isPlaying ? Math.max(0, performance.now() - anchorAt) : 0;
      const pos = anchorPosMs + elapsed;
      return durationMs > 0 ? Math.min(pos, durationMs) : pos;
    }

    // --- LRC parser + marker insertion (ported from main) ---------------
    function parseLrc(text) {
      const out = [];
      const stampRe = /\[(\d+):(\d+)(?:\.(\d+))?\]/g;
      for (const raw of text.split('\n')) {
        const stamps = [];
        let lastIdx = 0;
        let m;
        stampRe.lastIndex = 0;
        while ((m = stampRe.exec(raw)) !== null) {
          const minutes = parseInt(m[1], 10);
          const seconds = parseInt(m[2], 10);
          const fracStr = m[3] || '0';
          const frac = fracStr.length === 3 ? parseInt(fracStr, 10) : parseInt(fracStr, 10) * 10;
          stamps.push((minutes * 60 + seconds) * 1000 + frac);
          lastIdx = m.index + m[0].length;
        }
        const lineText = raw.slice(lastIdx).trim();
        if (stamps.length === 0 || !lineText) continue;
        for (const ms of stamps) out.push({ ms, text: lineText });
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }
    function estimateLineDurationMs(text, gapMs) {
      const chars = text.replace(/\s+/g, ' ').trim().length;
      const naive = Math.max(1500, chars * 280);
      return Math.min(naive, Math.max(1500, gapMs * 0.9));
    }
    function isExistingMarker(text) {
      if (/^[\s♪-♯]+$/.test(text)) return true;
      return /^\(?\s*(instrumental|interlude|music|guitar solo|outro|intro)\s*\)?$/i.test(text);
    }
    function addInstrumentalMarkers(lines, songDurationMs) {
      if (lines.length === 0) return lines;
      const NOTE = '♪';
      const SILENCE_THRESHOLD_MS = 8000;
      const SPACING_MS = 8000;
      const LEAD_MS = 1000;
      const TAIL_MS = 1500;
      const out = [];
      const insertGap = (start, end) => {
        if (end - start < SILENCE_THRESHOLD_MS) return;
        let t = start + LEAD_MS;
        while (t + 250 < end - TAIL_MS) {
          out.push({ ms: t, text: NOTE });
          t += SPACING_MS;
        }
      };
      insertGap(0, lines[0].ms);
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        out.push(line);
        const next = lines[i + 1];
        if (!next) {
          if (songDurationMs > 0) {
            const trailingGap = songDurationMs - line.ms;
            const sungEnds = line.ms + estimateLineDurationMs(line.text, trailingGap);
            insertGap(sungEnds, songDurationMs);
          }
          break;
        }
        if (isExistingMarker(line.text) || isExistingMarker(next.text)) continue;
        const gap = next.ms - line.ms;
        const sungEnds = line.ms + estimateLineDurationMs(line.text, gap);
        insertGap(sungEnds, next.ms);
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }

    function clearLyrics() {
      parsedLyrics = [];
      lyricLineEls = [];
      lyricsTrackEl = null;
      currentLineIdx = -1;
      lyricsEl.textContent = '';
      lyricsEl.classList.add('empty');
    }

    function renderLyrics(lines) {
      const track = document.createElement('div');
      track.className = 'track';
      track.style.transition = 'none';
      lyricLineEls = [];
      for (let i = 0; i < lines.length; i++) {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = lines[i].text;
        track.appendChild(div);
        lyricLineEls.push(div);
      }
      lyricsEl.textContent = '';
      lyricsEl.appendChild(track);
      lyricsTrackEl = track;
      requestAnimationFrame(() => {
        if (lyricsTrackEl === track) track.style.transition = '';
      });
      lyricsEl.classList.remove('empty');
    }

    async function fetchLyricsFor(artist, title, album) {
      const key = artist + '|' + title;
      if (key === lyricsFetchKey) return;
      lyricsFetchKey = key;
      clearLyrics();
      lyricsFallbackEl.classList.add('hidden');
      // Bail early when the user has lyrics off. We still set
      // lyricsFetchKey above so toggling-on later triggers a fetch via
      // the showLyrics callback (which clears the key for the same
      // track and re-calls fetchLyricsFor).
      if (!optShowLyrics) return;
      try {
        const url = HOST + '/api/lyrics?artist=' + encodeURIComponent(artist) +
          '&title=' + encodeURIComponent(title) +
          (album ? '&album=' + encodeURIComponent(album) : '');
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        if (key !== lyricsFetchKey) return;
        if (data.found && data.syncedLyrics) {
          const raw = parseLrc(data.syncedLyrics);
          parsedLyrics = addInstrumentalMarkers(raw, durationMs);
          renderLyrics(parsedLyrics);
          lyricsFallbackEl.classList.add('hidden');
        } else {
          lyricsFallbackEl.classList.remove('hidden');
        }
      } catch {
        lyricsFallbackEl.classList.remove('hidden');
      }
    }

    function updateCurrentLine(pos) {
      if (parsedLyrics.length === 0 || !lyricsTrackEl) return;
      // User-tunable offset for residual sync issues — positive value
      // pushes lyrics earlier (use if highlighter feels behind), negative
      // pushes them later. Wired to Behavior > Lyric sync offset.
      const adjustedPos = pos + optLyricSyncOffsetMs;
      let idx = currentLineIdx;
      while (idx + 1 < parsedLyrics.length && parsedLyrics[idx + 1].ms <= adjustedPos) idx++;
      while (idx >= 0 && parsedLyrics[idx].ms > adjustedPos) idx--;
      if (idx === currentLineIdx) return;

      if (currentLineIdx >= 0 && lyricLineEls[currentLineIdx]) {
        lyricLineEls[currentLineIdx].classList.remove('current');
        lyricLineEls[currentLineIdx].classList.add('past');
      }
      if (idx >= 0 && lyricLineEls[idx]) {
        lyricLineEls[idx].classList.remove('past');
        lyricLineEls[idx].classList.add('current');
        const lineEl = lyricLineEls[idx];
        const containerH = lyricsEl.clientHeight;
        const lineCenter = lineEl.offsetTop + lineEl.offsetHeight / 2;
        const offset = containerH / 2 - lineCenter;
        lyricsTrackEl.style.transform = 'translateY(' + offset.toFixed(1) + 'px)';
      }
      currentLineIdx = idx;
    }

    function tick() {
      const pos = currentPosition();
      const ratio = durationMs > 0 ? pos / durationMs : 0;
      const clamped = Math.max(0, Math.min(1, ratio));
      if (Math.abs(clamped - lastFillRatio) > 0.001) {
        fillEl.style.transform = 'scaleX(' + clamped.toFixed(4) + ')';
        lastFillRatio = clamped;
      }
      const cur = fmtTime(pos);
      const tot = fmtTime(durationMs);
      if (cur !== lastCurTime) { setText(curTimeEl, cur); lastCurTime = cur; }
      if (tot !== lastTotTime) { setText(totTimeEl, tot); lastTotTime = tot; }
      updateCurrentLine(pos);
    }

    async function pollOnce() {
      try {
        // Bracket the SMTC fetch so we can measure round-trip and
        // compensate the position anchor for one-way transit. Without
        // this the lyric highlighter is consistently behind the audio
        // by ~25-50ms because the host's "current position" was
        // computed at the moment IT serialized the response, not at
        // the moment we received it. Half-roundtrip is the best
        // estimate of one-way latency without server-clock alignment.
        const fetchStart = performance.now();
        const [npRes, ssRes] = await Promise.all([
          fetch(HOST + '/api/media/now-playing'),
          fetch(HOST + '/api/spotify/status'),
        ]);
        if (!npRes.ok) throw new Error('now-playing HTTP ' + npRes.status);
        if (!ssRes.ok) throw new Error('spotify/status HTTP ' + ssRes.status);
        const np = await npRes.json();
        const ss = await ssRes.json();
        const fetchEnd = performance.now();
        const halfRoundTrip = (fetchEnd - fetchStart) / 2;

        const wasAuthed = spotifyAuthed;
        spotifyAuthed = !!ss.connected;
        setLibMode(spotifyAuthed);

        if (spotifyAuthed) {
          try {
            const pbRes = await fetch(HOST + '/api/spotify/playback');
            if (pbRes.ok) await pbRes.json();
          } catch { /* non-fatal */ }
        }

        // Auth flipped — kick the slow Spotify pollers (queue + playlists)
        // immediately on first connect, and stop them on disconnect.
        if (spotifyAuthed && !wasAuthed) {
          pollSpotifyQueue();
          pollSpotifyPlaylists();
        } else if (!spotifyAuthed && wasAuthed) {
          spotifyQueue = [];
          spotifyPlaylists = [];
          setUpnext('');
          renderLibraryList();
        }

        const title = np.hasSession ? (np.title || 'Unknown title') : 'Nothing playing';
        const artist = np.hasSession ? (np.artist || '') : '';
        if (title !== lastTitle) { setText(titleEl, title); lastTitle = title; }
        if (artist !== lastArtist) { setText(artistEl, artist); lastArtist = artist; }
        // Source line: visible only when Spotify is the SMTC source.
        // (Other sources just don't show this line — title/artist alone is
        // enough for non-Spotify SMTC playback.)
        setSource(!!np.isSpotify && !!np.hasSession, np.album || '');
        setArt(!!np.hasArt && !!np.hasSession, np.artVersion ?? 0);

        const playing = np.status === 'Playing';
        isPlaying = playing;
        const canToggle = !!(np.canPlay || np.canPause);
        setToggleState(playing, canToggle);
        lastCanPrev = setBtnEnabled(prevBtn, !!np.canGoPrevious, lastCanPrev);
        lastCanNext = setBtnEnabled(nextBtn, !!np.canGoNext, lastCanNext);

        // Position anchor. np.positionMs was the host's best estimate
        // of "current position" at the moment IT serialized the
        // response. We received that response halfRoundTrip ms later,
        // so the position has actually advanced by that much (assuming
        // playing). Bake the latency compensation into anchorPosMs so
        // the local extrapolation uses an anchor that's aligned with
        // performance.now() = fetchEnd.
        const rawServerPos = typeof np.positionMs === 'number' ? np.positionMs : 0;
        const serverPos = isPlaying ? rawServerPos + halfRoundTrip : rawServerPos;
        durationMs = typeof np.durationMs === 'number' ? np.durationMs : 0;
        const trackKey = (np.title || '') + '|' + (np.artist || '');
        const now = fetchEnd;
        const trackChanged = trackKey !== lastTrackKey;
        if (anchorAt === 0 || trackChanged) {
          anchorPosMs = serverPos;
          anchorAt = now;
          lastTrackKey = trackKey;
        } else {
          const localExtrap = isPlaying ? anchorPosMs + (now - anchorAt) : anchorPosMs;
          const delta = serverPos - localExtrap;
          if (delta > SEEK_THRESHOLD_FORWARD || delta < -SEEK_THRESHOLD_BACKWARD) {
            anchorPosMs = serverPos;
            anchorAt = now;
          }
        }

        // Track current metadata for the showLyrics toggle handler — it
        // needs to fetch lyrics for the *currently-playing* track when
        // the user flips the option on, without waiting for a track
        // change.
        currentArtist = artist;
        currentTitle = title;
        currentAlbum = np.album || '';

        if (trackChanged && np.hasSession && artist && title) {
          fetchLyricsFor(artist, title, np.album || '');
        } else if (!np.hasSession) {
          clearLyrics();
          lyricsFallbackEl.classList.add('hidden');
          currentArtist = '';
          currentTitle = '';
          currentAlbum = '';
        }

        statusEl.classList.remove('err');
        statusEl.textContent = 'media v2';
        flashPulse();
      } catch (e) {
        statusEl.classList.add('err');
        statusEl.textContent = 'host offline · ' + (e.message || 'unknown error');
      }
    }

    artEl.addEventListener('error', () => {
      artEl.classList.add('empty');
      lastHasArt = false;
    });

    // Register Behavior options. The handler fires once at registration
    // with the initial value, then again any time pollIcueOptions
    // detects a change.
    registerIcueOption('pollIntervalMs', 1500, value => {
      const n = Number(value);
      pollIntervalMs = Number.isFinite(n) ? Math.max(500, Math.min(5000, n)) : 1500;
      // Restart the interval so the new cadence takes effect immediately
      // rather than waiting up to the OLD interval first.
      if (pollTimer) startPollTimer();
    });
    registerIcueOption('autoExpand', true, value => {
      optAutoExpand = value !== false;
    });
    registerIcueOption('autoExpandAfterSec', 30, value => {
      const n = Number(value);
      optAutoExpandAfterSec = Number.isFinite(n) ? n : 30;
    });
    registerIcueOption('showLyrics', true, value => {
      optShowLyrics = value !== false;
      if (!optShowLyrics) {
        // Toggling off: clear the rendered list + the fallback message,
        // and drop the fetch key so re-enabling later triggers a fresh
        // fetch on the same track.
        clearLyrics();
        lyricsFallbackEl.classList.add('hidden');
        lyricsFetchKey = '';
      } else {
        // Toggling on: drop the fetch key AND fetch directly for the
        // currently-playing track. Without the direct fetch, we'd wait
        // for the next track change before lyrics reappeared.
        lyricsFetchKey = '';
        if (currentArtist && currentTitle) {
          fetchLyricsFor(currentArtist, currentTitle, currentAlbum);
        }
      }
    });
    registerIcueOption('lyricSyncOffsetMs', 0, value => {
      const n = Number(value);
      optLyricSyncOffsetMs = Number.isFinite(n) ? n : 0;
    });

    pollOnce();
    startPollTimer();
    setInterval(tick, TICK_MS);
    // Slow Spotify pollers — separate cadences from the main 1.5s poll.
    // Queue refreshes 6s; playlists every 10 min (host caches 30 min,
    // and Spotify rate-limits /me/playlists hard if hammered).
    queueTimer = setInterval(pollSpotifyQueue, SPOTIFY_QUEUE_MS);
    playlistsTimer = setInterval(pollSpotifyPlaylists, SPOTIFY_PLAYLISTS_MS);
  </script>
</body>
</html>

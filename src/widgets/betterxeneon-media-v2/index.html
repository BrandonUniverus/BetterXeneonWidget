    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m + ':' + (r < 10 ? '0' : '') + r;
    }

    function currentPosition() {
      if (anchorAt === 0) return 0;
      const elapsed = isPlaying ? Math.max(0, performance.now() - anchorAt) : 0;
      const pos = anchorPosMs + elapsed;
      return durationMs > 0 ? Math.min(pos, durationMs) : pos;
    }

    // --- LRC parser + marker insertion (ported from main) ---------------
    function parseLrc(text) {
      const out = [];
      const stampRe = /\[(\d+):(\d+)(?:\.(\d+))?\]/g;
      for (const raw of text.split('\n')) {
        const stamps = [];
        let lastIdx = 0;
        let m;
        stampRe.lastIndex = 0;
        while ((m = stampRe.exec(raw)) !== null) {
          const minutes = parseInt(m[1], 10);
          const seconds = parseInt(m[2], 10);
          const fracStr = m[3] || '0';
          const frac = fracStr.length === 3 ? parseInt(fracStr, 10) : parseInt(fracStr, 10) * 10;
          stamps.push((minutes * 60 + seconds) * 1000 + frac);
          lastIdx = m.index + m[0].length;
        }
        const lineText = raw.slice(lastIdx).trim();
        if (stamps.length === 0 || !lineText) continue;
        for (const ms of stamps) out.push({ ms, text: lineText });
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }
    function estimateLineDurationMs(text, gapMs) {
      const chars = text.replace(/\s+/g, ' ').trim().length;
      const naive = Math.max(1500, chars * 280);
      return Math.min(naive, Math.max(1500, gapMs * 0.9));
    }
    function isExistingMarker(text) {
      if (/^[\s♪-♯]+$/.test(text)) return true;
      return /^\(?\s*(instrumental|interlude|music|guitar solo|outro|intro)\s*\)?$/i.test(text);
    }
    function addInstrumentalMarkers(lines, songDurationMs) {
      if (lines.length === 0) return lines;
      const NOTE = '♪';
      const SILENCE_THRESHOLD_MS = 8000;
      const SPACING_MS = 8000;
      const LEAD_MS = 1000;
      const TAIL_MS = 1500;
      const out = [];
      const insertGap = (start, end) => {
        if (end - start < SILENCE_THRESHOLD_MS) return;
        let t = start + LEAD_MS;
        while (t + 250 < end - TAIL_MS) {
          out.push({ ms: t, text: NOTE });
          t += SPACING_MS;
        }
      };
      insertGap(0, lines[0].ms);
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        out.push(line);
        const next = lines[i + 1];
        if (!next) {
          if (songDurationMs > 0) {
            const trailingGap = songDurationMs - line.ms;
            const sungEnds = line.ms + estimateLineDurationMs(line.text, trailingGap);
            insertGap(sungEnds, songDurationMs);
          }
          break;
        }
        if (isExistingMarker(line.text) || isExistingMarker(next.text)) continue;
        const gap = next.ms - line.ms;
        const sungEnds = line.ms + estimateLineDurationMs(line.text, gap);
        insertGap(sungEnds, next.ms);
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }

    function clearLyrics() {
      parsedLyrics = [];
      lyricLineEls = [];
      lyricsTrackEl = null;
      currentLineIdx = -1;
      lyricsEl.textContent = '';
      applyView();
    }

    function renderLyrics(lines) {
      const track = document.createElement('div');
      track.className = 'track';
      track.style.transition = 'none';
      lyricLineEls = [];
      for (let i = 0; i < lines.length; i++) {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = lines[i].text;
        track.appendChild(div);
        lyricLineEls.push(div);
      }
      lyricsEl.textContent = '';
      lyricsEl.appendChild(track);
      lyricsTrackEl = track;
      requestAnimationFrame(() => {
        if (lyricsTrackEl === track) track.style.transition = '';
      });
      applyView();
    }

    // Memory cache of LRClib responses keyed by `artist|title`. Stores the
    // raw response object {found, syncedLyrics, ...} — the parseLrc +
    // marker insertion happens at render time because it depends on
    // durationMs which is per-track. ~50 entries cap so a really long
    // session doesn't grow unbounded; LRU eviction by insertion order.
    const lyricsCache = new Map();
    const LYRICS_CACHE_MAX = 50;
    function lyricsCacheKey(artist, title) {
      return (artist || '') + '|' + (title || '');
    }
    function lyricsCachePut(key, value) {
      if (lyricsCache.has(key)) lyricsCache.delete(key);  // re-insert for LRU
      lyricsCache.set(key, value);
      while (lyricsCache.size > LYRICS_CACHE_MAX) {
        const oldest = lyricsCache.keys().next().value;
        lyricsCache.delete(oldest);
      }
    }

    async function loadLyricsResponse(artist, title, album) {
      // Returns the host's /api/lyrics response object (or null on error).
      // Hits memory cache first — only the FIRST request per track pays
      // the network round-trip; prefetch from the queue means by the time
      // a track actually plays, this should already be a cache hit.
      const key = lyricsCacheKey(artist, title);
      if (lyricsCache.has(key)) return lyricsCache.get(key);
      try {
        const url = HOST + '/api/lyrics?artist=' + encodeURIComponent(artist) +
          '&title=' + encodeURIComponent(title) +
          (album ? '&album=' + encodeURIComponent(album) : '');
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        lyricsCachePut(key, data);
        return data;
      } catch {
        return null;
      }
    }

    function prefetchLyricsForQueue() {
      // Fire-and-forget prefetch of the next few queue tracks. Album is
      // omitted because the queue items don't carry it — LRClib's match
      // is fine without it for most cases (artist + title is the primary
      // key); the active-track fetch on track-change still passes album.
      if (!optShowLyrics) return;
      const upcoming = spotifyQueue.slice(0, 5);
      for (const t of upcoming) {
        if (!t.artist || !t.title) continue;
        const key = lyricsCacheKey(t.artist, t.title);
        if (lyricsCache.has(key)) continue;
        // Don't await — we want concurrent fan-out, and we don't care
        // about the result here. The cache fill is the side effect.
        void loadLyricsResponse(t.artist, t.title, '');
      }
    }

    async function fetchLyricsFor(artist, title, album) {
      const key = artist + '|' + title;
      if (key === lyricsFetchKey) return;
      lyricsFetchKey = key;
      clearLyrics();
      // Bail early when the user has lyrics off. We still set
      // lyricsFetchKey above so toggling-on later triggers a fetch via
      // the showLyrics callback (which clears the key for the same
      // track and re-calls fetchLyricsFor). When lyrics are off, the
      // queue auto-fallback in applyView takes over.
      if (!optShowLyrics) { applyView(); return; }
      const data = await loadLyricsResponse(artist, title, album);
      if (key !== lyricsFetchKey) return;        // user changed track mid-fetch
      if (data && data.found && data.syncedLyrics) {
        const raw = parseLrc(data.syncedLyrics);
        parsedLyrics = addInstrumentalMarkers(raw, durationMs);
        renderLyrics(parsedLyrics);
      } else {
        applyView();
      }
    }

    function updateCurrentLine(pos) {
      if (parsedLyrics.length === 0 || !lyricsTrackEl) return;
      // User-tunable offset for residual sync issues — positive value
      // pushes lyrics earlier (use if highlighter feels behind), negative
      // pushes them later. Wired to Behavior > Lyric sync offset.
      const adjustedPos = pos + optLyricSyncOffsetMs;
      let idx = currentLineIdx;
      while (idx + 1 < parsedLyrics.length && parsedLyrics[idx + 1].ms <= adjustedPos) idx++;
      while (idx >= 0 && parsedLyrics[idx].ms > adjustedPos) idx--;
      if (idx === currentLineIdx) return;

      if (currentLineIdx >= 0 && lyricLineEls[currentLineIdx]) {
        lyricLineEls[currentLineIdx].classList.remove('current');
        lyricLineEls[currentLineIdx].classList.add('past');
      }
      if (idx >= 0 && lyricLineEls[idx]) {
        lyricLineEls[idx].classList.remove('past');
        lyricLineEls[idx].classList.add('current');
        const lineEl = lyricLineEls[idx];
        const containerH = lyricsEl.clientHeight;
        const lineCenter = lineEl.offsetTop + lineEl.offsetHeight / 2;
        const offset = containerH / 2 - lineCenter;
        lyricsTrackEl.style.transform = 'translateY(' + offset.toFixed(1) + 'px)';
      }
      currentLineIdx = idx;
    }

    function tick() {
      const pos = currentPosition();
      const ratio = durationMs > 0 ? pos / durationMs : 0;
      const clamped = Math.max(0, Math.min(1, ratio));
      if (Math.abs(clamped - lastFillRatio) > 0.001) {
        fillEl.style.transform = 'scaleX(' + clamped.toFixed(4) + ')';
        lastFillRatio = clamped;
      }
      const cur = fmtTime(pos);
      const tot = fmtTime(durationMs);
      if (cur !== lastCurTime) { setText(curTimeEl, cur); lastCurTime = cur; }
      if (tot !== lastTotTime) { setText(totTimeEl, tot); lastTotTime = tot; }
      updateCurrentLine(pos);
    }

    async function pollOnce() {
      try {
        // Host returns both SMTC position and the UTC moment that position
        // was sampled/extrapolated. We map that wall-clock timestamp into
        // this process' performance.now() timeline, so host work after the
        // sample (album-art cache refresh, JSON serialization, localhost
        // transport) doesn't become lyric-sync drift.
        const [npRes, ssRes] = await Promise.all([
          fetch(HOST + '/api/media/now-playing'),
          fetch(HOST + '/api/spotify/status'),
        ]);
        if (!npRes.ok) throw new Error('now-playing HTTP ' + npRes.status);
        if (!ssRes.ok) throw new Error('spotify/status HTTP ' + ssRes.status);
        const np = await npRes.json();
        const ss = await ssRes.json();
        const fetchEnd = performance.now();

        const wasAuthed = spotifyAuthed;
        const wasSpotifySource = lastIsSpotify;
        spotifyAuthed = !!ss.connected;
        lastIsSpotify = !!np.isSpotify && !!np.hasSession;
        let spotifySourceChanged = wasSpotifySource !== lastIsSpotify;
        if (!lastIsSpotify) {
          if (currentView === 'queue' || currentView === 'playlists') {
            currentView = 'lyrics';
            spotifySourceChanged = true;
          }
          if (spotifyQueue.length > 0) {
            spotifyQueue = [];
            spotifySourceChanged = true;
          }
          setUpnext('');
        }
        setLibMode();
        // (No /api/spotify/playback poll here.) SMTC already gives us
        // title/artist/album/position/duration/state for the local audio
        // session, and that's all this widget consumes. /me/player was
        // being fetched and thrown away every 1.5s — ~40 Spotify API calls
        // per minute for no rendered output. The endpoint stays available
        // on the host (some future "playing on [Device X]" affordance
        // would want it), but the widget doesn't poll it.

        // Auth flipped — kick the slow Spotify pollers (queue + playlists)
        // immediately on first connect, and stop them on disconnect.
        if (spotifyAuthed && lastIsSpotify && (!wasAuthed || !wasSpotifySource)) {
          pollSpotifyQueue(true);
          pollSpotifyPlaylists();
        } else if (!spotifyAuthed && wasAuthed) {
          spotifyQueue = [];
          spotifyPlaylists = [];
          setUpnext('');
          // If the user was on the playlists view when auth dropped,
          // bounce them back to lyrics/queue — the playlists view has
          // nothing to show without a token.
          if (currentView === 'playlists') currentView = 'lyrics';
          applyView();
        } else if (spotifySourceChanged) {
          applyView();
        }

        const title = np.hasSession ? (np.title || 'Unknown title') : 'Nothing playing';
        const artist = np.hasSession ? (np.artist || '') : '';
        if (title !== lastTitle) { setText(titleEl, title); lastTitle = title; }
        if (artist !== lastArtist) { setText(artistEl, artist); lastArtist = artist; }
        // Source line: visible only when Spotify is the SMTC source.
        // (Other sources just don't show this line — title/artist alone is
        // enough for non-Spotify SMTC playback.)
        setSource(lastIsSpotify, np.album || '');
        setArt(!!np.hasArt && !!np.hasSession, np.artVersion ?? 0);

        const playing = np.status === 'Playing';
        isPlaying = playing;
        const canToggle = !!(np.canPlay || np.canPause);
        setToggleState(playing, canToggle);
        lastCanPrev = setBtnEnabled(prevBtn, !!np.canGoPrevious, lastCanPrev);
        lastCanNext = setBtnEnabled(nextBtn, !!np.canGoNext, lastCanNext);

        // Position anchor. Use serverPos at the host's sample time.
        // Then apply a small constant slowdown — SMTC + Windows audio
        // pipeline + speaker buffer typically adds ~30ms of latency between
        // "where the file pointer is" and "what the listener hears". Without
        // compensation the highlighter feels a hair too eager. Sign matters:
        // this SUBTRACTS from the position so lyric lines hit later, which
        // is the opposite direction from the old halfRoundTrip patch (that
        // one added to the position and made lyrics earlier — wrong fix).
        // The iCUE Lyric sync offset slider stacks on top for per-song tuning.
        const PERCEPTUAL_LAG_MS = 30;
        const rawPos = typeof np.positionMs === 'number' ? np.positionMs : 0;
        const serverPos = rawPos - PERCEPTUAL_LAG_MS;
        durationMs = typeof np.durationMs === 'number' ? np.durationMs : 0;
        const trackKey = (np.title || '') + '|' + (np.artist || '');
        const capturedUtcMs = typeof np.positionCapturedAtUtcMs === 'number'
          ? np.positionCapturedAtUtcMs
          : 0;
        const sampleAgeMs = capturedUtcMs > 0 ? Date.now() - capturedUtcMs : NaN;
        const sampleAt = Number.isFinite(sampleAgeMs) && sampleAgeMs >= 0 && sampleAgeMs < 10_000
          ? fetchEnd - sampleAgeMs
          : fetchEnd;
        const now = sampleAt;
        const trackChanged = trackKey !== lastTrackKey;
        if (anchorAt === 0 || trackChanged) {
          anchorPosMs = serverPos;
          anchorAt = now;
          lastTrackKey = trackKey;
        } else {
          const localExtrap = isPlaying ? anchorPosMs + (now - anchorAt) : anchorPosMs;
          const delta = serverPos - localExtrap;
          if (delta > SEEK_THRESHOLD_FORWARD || delta < -SEEK_THRESHOLD_BACKWARD) {
            anchorPosMs = serverPos;
            anchorAt = now;
          }
        }

        // Track current metadata for the showLyrics toggle handler — it
        // needs to fetch lyrics for the *currently-playing* track when
        // the user flips the option on, without waiting for a track
        // change.
        currentArtist = artist;
        currentTitle = title;
        currentAlbum = np.album || '';

        // Track change resets the user out of any explicit
        // queue/playlists view back to lyrics — feels jarring if the
        // queue stays up after the next-track-up has finished and is
        // now actually playing.
        if (trackChanged && currentView !== 'lyrics') {
          currentView = 'lyrics';
          applyView();
        }
        if (trackChanged && spotifyAuthed && lastIsSpotify) {
          clearRenderedQueue();
          pollSpotifyQueue(true);
        }
        if (trackChanged && np.hasSession && artist && title) {
          fetchLyricsFor(artist, title, np.album || '');
        } else if (!np.hasSession) {
          clearLyrics();
          currentArtist = '';
          currentTitle = '';
          currentAlbum = '';
        }

        statusEl?.classList.remove('err');
        if (statusEl) statusEl.textContent = 'media v2';
        flashPulse();
      } catch (e) {
        statusEl?.classList.add('err');
        if (statusEl) statusEl.textContent = 'host offline · ' + (e.message || 'unknown error');
      }
    }

    artEl.addEventListener('error', () => {
      artEl.classList.add('empty');
      lastHasArt = false;
      invalidateEqLayoutCache();
      // No cover → fall back to default green palette for the EQ.
      deriveEqColors(null);
      // Album theme also re-syncs to the default green accent.
      if (optTheme === 0) applyTheme();
    });
    // On every album-art change, re-derive the equalizer's two-tone
    // gradient from the new cover. extractDominantColor uses 64×64 of
    // pixel data which is cheap (~30µs) so doing it on every load is
    // fine. CORS lets the canvas read the cross-origin host response.
    // For the Album theme, also refresh the global accent so the play
    // button / progress fill / current lyric color all shift with the
    // new cover.
    artEl.addEventListener('load', () => {
      invalidateEqLayoutCache();
      updateEqColorsFromArt();
      if (optTheme === 0) applyTheme();
    });

    // Register Settings handlers. Each registerSetting() fires its handler
    // once immediately with the default value, then again when loadSettings
    // resolves with the host-backed value (if different), and again every
    // time the user changes the value via the in-widget Settings view.
    registerSetting('pollIntervalMs', value => {
      const n = Number(value);
      pollIntervalMs = Number.isFinite(n) ? Math.max(500, Math.min(5000, n)) : 1500;
      // Restart the interval so the new cadence takes effect immediately
      // rather than waiting up to the OLD interval first.
      if (pollTimer) startPollTimer();
    });
    registerSetting('autoExpand', value => {
      optAutoExpand = value !== false;
    });
    registerSetting('autoExpandAfterSec', value => {
      const n = Number(value);
      optAutoExpandAfterSec = Number.isFinite(n) ? n : 30;
    });
    registerSetting('showLyrics', value => {
      optShowLyrics = value !== false;
      if (!optShowLyrics) {
        // Toggling off: clear the rendered lyric list and drop the
        // fetch key so re-enabling later triggers a fresh fetch on
        // the same track. clearLyrics → applyView falls through to
        // the queue list automatically.
        clearLyrics();
        lyricsFetchKey = '';
      } else {
        // Toggling on: drop the fetch key AND fetch directly for the
        // currently-playing track. Without the direct fetch, we'd wait
        // for the next track change before lyrics reappeared.
        lyricsFetchKey = '';
        if (currentArtist && currentTitle) {
          fetchLyricsFor(currentArtist, currentTitle, currentAlbum);
        } else {
          // No active track to fetch for — but we still need to
          // re-evaluate the view so any visible queue stays consistent.
          applyView();
        }
      }
    });
    registerSetting('lyricSyncOffsetMs', value => {
      const n = Number(value);
      optLyricSyncOffsetMs = Number.isFinite(n) ? n : 0;
    });
    registerSetting('listeningView', value => {
      const n = Number(value);
      optListeningView = Number.isFinite(n) ? Math.max(0, Math.min(2, Math.round(n))) : 0;
      // Re-apply if we're currently in listening mode so the user sees the
      // submode change immediately without having to wait for idle to flip.
      if (listeningMode) applyListeningMode();
      // EQ visibility tracks listeningView even outside listening mode (so
      // toggling the option mid-session still produces the right visualizer
      // state — most notably, dropping the EQ stream when leaving submode 2).
      applyEqVisibility();
    });
    registerSetting('eqBackground', value => {
      optEqBackground = value === true || value === 'true';
      applyEqVisibility();
    });
    registerSetting('theme', value => {
      const n = Number(value);
      optTheme = Number.isFinite(n) ? Math.max(0, Math.min(5, Math.round(n))) : 0;
      applyTheme();
      invalidateEqLayoutCache();
    });
    registerSetting('eqVisualizerMode', value => {
      const n = Number(value);
      optEqVisualizerMode = Number.isFinite(n) ? Math.max(0, Math.min(2, Math.round(n))) : 0;
      applyEqMode();
      invalidateEqLayoutCache();
      if (eqWanted()) renderEqFrame(1 / 60);
    });
    registerSetting('eqShowAlbumArt', value => {
      optEqShowAlbumArt = value === true || value === 'true';
      applyEqVisibility();
    });

    // Kick the initial settings load — fires every handler with the
    // host-backed value (if different from the default). Not awaited:
    // the polling / rendering below operates on the defaults until the
    // first GET response lands, then re-fires.
    void loadSettings();

    pollOnce();
    startPollTimer();
    setInterval(tick, TICK_MS);
    // Slow Spotify pollers — separate cadences from the main 1.5s poll.
    // Queue refreshes every 10s; playlists every 10 min (host caches 30 min,
    // and Spotify rate-limits /me/playlists hard if hammered).
    queueTimer = setInterval(pollSpotifyQueue, SPOTIFY_QUEUE_MS);
    playlistsTimer = setInterval(pollSpotifyPlaylists, SPOTIFY_PLAYLISTS_MS);
  </script>
</body>
</html>

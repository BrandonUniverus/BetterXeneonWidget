<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tr('Better Media v2')</title>
  <link rel="icon" type="image/svg+xml" href="resources/icon.svg">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0c;
      color: #fff;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
    }
    .art {
      width: min(34vmin, 170px);
      aspect-ratio: 1 / 1;
      flex: 0 1 auto;
      min-height: 0;
      border-radius: 10px;
      object-fit: cover;
      background: #1c1c22;
      display: block;
    }
    .art.empty { visibility: hidden; }
    .text {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .title {
      font-size: clamp(18px, 4vmin, 30px);
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .artist {
      font-size: clamp(13px, 2.6vmin, 20px);
      font-weight: 500;
      opacity: 0.75;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Progress bar — track is fixed, fill scales horizontally via transform.
       Using scaleX (not width) so the update is composite-only: no layout,
       no paint of the track, just GPU re-rasterization of the fill layer. */
    .progress {
      width: min(60vmin, 320px);
      max-width: 90%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
    }
    .progress .track {
      height: 4px;
      background: #2a2a32;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress .fill {
      position: absolute;
      inset: 0;
      background: #1db954;
      transform-origin: left center;
      transform: scaleX(0);
      will-change: transform;
    }
    .progress .times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      opacity: 0.6;
      letter-spacing: 0.02em;
    }

    /* Transport row */
    .transport {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .t-btn {
      width: clamp(44px, 8vmin, 64px);
      height: clamp(44px, 8vmin, 64px);
      border-radius: 50%;
      border: none;
      background: #1c1c22;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 80ms;
    }
    .t-btn:hover { background: #2a2a32; }
    .t-btn:active { background: #2a2a32; }
    .t-btn:disabled { opacity: 0.3; cursor: default; }
    .t-btn svg {
      width: 42%;
      height: 42%;
      pointer-events: none;
      fill: currentColor;
    }
    .t-btn.center {
      background: #1db954;
      color: #08130c;
    }
    .t-btn.center:hover, .t-btn.center:active { background: #1ed760; }

    .phase {
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: 0.08em;
      opacity: 0.45;
      text-transform: uppercase;
    }
    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1db954;
      margin-right: 8px;
      vertical-align: middle;
      transition: opacity 200ms;
      opacity: 0.25;
    }
    .pulse.live { opacity: 1; }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="root">
    <img class="art empty" id="art" alt="">
    <div class="text">
      <div class="title" id="title">Connecting…</div>
      <div class="artist" id="artist"></div>
    </div>
    <div class="progress">
      <div class="track"><div class="fill" id="fill"></div></div>
      <div class="times"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
    </div>
    <div class="transport">
      <button class="t-btn" id="prevBtn" type="button" aria-label="Previous track" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 5h2v14H6zM10 12l9-7v14z"/>
        </svg>
      </button>
      <button class="t-btn center" id="toggleBtn" type="button" aria-label="Play" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true" id="toggleIcon">
          <path d="M7 5l13 7-13 7z"/>
        </svg>
      </button>
      <button class="t-btn" id="nextBtn" type="button" aria-label="Next track" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5l9 7-9 7zM16 5h2v14h-2z"/>
        </svg>
      </button>
    </div>
    <div class="phase"><span class="pulse" id="pulse"></span><span id="status">media v2 · phase 4</span></div>
  </div>

  <script type="module">
    // Phase 4 goal: introduce the 200ms tick cadence that drives a smooth
    // progress bar. Server polls (1.5s) anchor the playback position;
    // local 200ms ticks extrapolate forward. The bar update path is
    // deliberately compositor-only (transform: scaleX) so even at 5 Hz
    // it shouldn't cost layout work. Time labels update via textContent
    // every tick, but only when the displayed minute:second value changed.

    const HOST = 'http://127.0.0.1:8976';
    const POLL_MS = 1500;
    const TICK_MS = 200;
    // If the server estimate diverges from local extrapolation by more
    // than this, treat it as a seek and hard re-anchor. Otherwise we
    // ignore minor drift to keep the bar moving smoothly.
    const SEEK_THRESHOLD_FORWARD = 2500;
    const SEEK_THRESHOLD_BACKWARD = 2000;

    const artEl = document.getElementById('art');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const prevBtn = document.getElementById('prevBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const nextBtn = document.getElementById('nextBtn');
    const toggleIcon = document.getElementById('toggleIcon');
    const fillEl = document.getElementById('fill');
    const curTimeEl = document.getElementById('curTime');
    const totTimeEl = document.getElementById('totTime');
    const pulseEl = document.getElementById('pulse');
    const statusEl = document.getElementById('status');

    const PLAY_PATH = 'M7 5l13 7-13 7z';
    const PAUSE_PATH = 'M6 5h4v14H6zM14 5h4v14h-4z';

    let lastTitle = null;
    let lastArtist = null;
    let lastArtVersion = -1;
    let lastHasArt = null;
    let lastIsPlaying = null;
    let lastCanPrev = null;
    let lastCanNext = null;
    let lastCanToggle = null;
    let lastCurTime = null;
    let lastTotTime = null;
    let lastFillRatio = -1;
    let pulseTimeout = null;

    // Position state. anchorPosMs/anchorAt re-set on each poll (or on
    // detected seek). Track key changes also re-anchor.
    let anchorPosMs = 0;
    let anchorAt = 0;
    let durationMs = 0;
    let isPlaying = false;
    let lastTrackKey = '';

    const inFlight = { prev: false, toggle: false, next: false };

    function setText(el, value) {
      if (el.textContent !== value) el.textContent = value;
    }

    function setArt(hasArt, version) {
      if (hasArt && version !== lastArtVersion) {
        artEl.src = HOST + '/api/media/album-art?v=' + version;
        lastArtVersion = version;
      }
      if (hasArt !== lastHasArt) {
        artEl.classList.toggle('empty', !hasArt);
        lastHasArt = hasArt;
      }
    }

    function setToggleState(playing, canToggle) {
      if (playing !== lastIsPlaying) {
        toggleIcon.firstElementChild.setAttribute('d', playing ? PAUSE_PATH : PLAY_PATH);
        toggleBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        lastIsPlaying = playing;
      }
      if (canToggle !== lastCanToggle) {
        toggleBtn.disabled = !canToggle;
        lastCanToggle = canToggle;
      }
    }

    function setBtnEnabled(btn, enabled, lastVar) {
      if (enabled !== lastVar) btn.disabled = !enabled;
      return enabled;
    }

    function flashPulse() {
      pulseEl.classList.add('live');
      if (pulseTimeout) clearTimeout(pulseTimeout);
      pulseTimeout = setTimeout(() => pulseEl.classList.remove('live'), 250);
    }

    async function postAction(path, key) {
      if (inFlight[key]) return;
      inFlight[key] = true;
      try {
        await fetch(HOST + path, { method: 'POST' });
      } catch { /* surfaced by next poll's status */ }
      finally { inFlight[key] = false; }
    }

    prevBtn.addEventListener('click', () => postAction('/api/media/previous', 'prev'));
    toggleBtn.addEventListener('click', () => postAction('/api/media/toggle', 'toggle'));
    nextBtn.addEventListener('click', () => postAction('/api/media/next', 'next'));

    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m + ':' + (r < 10 ? '0' : '') + r;
    }

    function currentPosition() {
      // Local extrapolation from anchor. Pause = freeze at anchor value.
      if (anchorAt === 0) return 0;
      const elapsed = isPlaying ? Math.max(0, performance.now() - anchorAt) : 0;
      const pos = anchorPosMs + elapsed;
      return durationMs > 0 ? Math.min(pos, durationMs) : pos;
    }

    function tick() {
      const pos = currentPosition();
      // Bar fill — only update if the visible ratio changed by more than
      // 1/1000 (i.e. ~1 device pixel on a 1000px-wide bar). Avoids style
      // recalc thrash from sub-pixel jitter.
      const ratio = durationMs > 0 ? pos / durationMs : 0;
      const clamped = Math.max(0, Math.min(1, ratio));
      if (Math.abs(clamped - lastFillRatio) > 0.001) {
        fillEl.style.transform = 'scaleX(' + clamped.toFixed(4) + ')';
        lastFillRatio = clamped;
      }
      // Time labels — only touch DOM when the displayed M:SS actually changed.
      const cur = fmtTime(pos);
      const tot = fmtTime(durationMs);
      if (cur !== lastCurTime) { setText(curTimeEl, cur); lastCurTime = cur; }
      if (tot !== lastTotTime) { setText(totTimeEl, tot); lastTotTime = tot; }
    }

    async function pollOnce() {
      try {
        const res = await fetch(HOST + '/api/media/now-playing');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const np = await res.json();

        const title = np.hasSession ? (np.title || 'Unknown title') : 'Nothing playing';
        const artist = np.hasSession ? (np.artist || '') : '';
        if (title !== lastTitle) { setText(titleEl, title); lastTitle = title; }
        if (artist !== lastArtist) { setText(artistEl, artist); lastArtist = artist; }
        setArt(!!np.hasArt && !!np.hasSession, np.artVersion ?? 0);

        const playing = np.status === 'Playing';
        isPlaying = playing;
        const canToggle = !!(np.canPlay || np.canPause);
        setToggleState(playing, canToggle);
        lastCanPrev = setBtnEnabled(prevBtn, !!np.canGoPrevious, lastCanPrev);
        lastCanNext = setBtnEnabled(nextBtn, !!np.canGoNext, lastCanNext);

        // Position handling — anchor on track change, on first poll, or on
        // detected seek (delta past threshold). Otherwise let local extrap
        // continue smoothly.
        const serverPos = typeof np.positionMs === 'number' ? np.positionMs : 0;
        durationMs = typeof np.durationMs === 'number' ? np.durationMs : 0;
        const trackKey = (np.title || '') + '|' + (np.artist || '');
        const now = performance.now();

        if (anchorAt === 0 || trackKey !== lastTrackKey) {
          anchorPosMs = serverPos;
          anchorAt = now;
          lastTrackKey = trackKey;
        } else {
          const localExtrap = isPlaying ? anchorPosMs + (now - anchorAt) : anchorPosMs;
          const delta = serverPos - localExtrap;
          if (delta > SEEK_THRESHOLD_FORWARD || delta < -SEEK_THRESHOLD_BACKWARD) {
            anchorPosMs = serverPos;
            anchorAt = now;
          }
        }

        statusEl.classList.remove('err');
        statusEl.textContent = 'media v2 · phase 4';
        flashPulse();
      } catch (e) {
        statusEl.classList.add('err');
        statusEl.textContent = 'host offline · ' + (e.message || 'unknown error');
      }
    }

    artEl.addEventListener('error', () => {
      artEl.classList.add('empty');
      lastHasArt = false;
    });

    pollOnce();
    setInterval(pollOnce, POLL_MS);
    setInterval(tick, TICK_MS);
  </script>
</body>
</html>

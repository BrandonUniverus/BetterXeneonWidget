<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tr('Better Media v2')</title>
  <link rel="icon" type="image/svg+xml" href="resources/icon.svg">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0c;
      color: #fff;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
    }
    .art {
      width: min(34vmin, 170px);
      aspect-ratio: 1 / 1;
      flex: 0 1 auto;
      min-height: 0;
      border-radius: 10px;
      object-fit: cover;
      background: #1c1c22;
      display: block;
    }
    .art.empty { visibility: hidden; }
    .text {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .title {
      font-size: clamp(18px, 4vmin, 30px);
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .artist {
      font-size: clamp(13px, 2.6vmin, 20px);
      font-weight: 500;
      opacity: 0.75;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* "Up next" line — shows the head of the Spotify queue when authed.
       visibility:hidden when nothing to show so layout doesn't shift. */
    .upnext {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.55;
      letter-spacing: 0.04em;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 14px;  /* reserve the row even when empty */
    }
    .upnext.empty { visibility: hidden; }
    .upnext .label {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-right: 6px;
      color: #1db954;
    }

    /* Progress bar */
    .progress {
      width: min(60vmin, 320px);
      max-width: 90%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 4px;
    }
    .progress .track {
      height: 4px;
      background: #2a2a32;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress .fill {
      position: absolute;
      inset: 0;
      background: #1db954;
      transform-origin: left center;
      transform: scaleX(0);
      will-change: transform;
    }
    .progress .times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      opacity: 0.6;
      letter-spacing: 0.02em;
    }

    .transport {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .t-btn {
      width: clamp(44px, 8vmin, 64px);
      height: clamp(44px, 8vmin, 64px);
      border-radius: 50%;
      border: none;
      background: #1c1c22;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 80ms;
    }
    .t-btn:hover { background: #2a2a32; }
    .t-btn:active { background: #2a2a32; }
    .t-btn:disabled { opacity: 0.3; cursor: default; }
    .t-btn svg {
      width: 42%;
      height: 42%;
      pointer-events: none;
      fill: currentColor;
    }
    .t-btn.center {
      background: #1db954;
      color: #08130c;
    }
    .t-btn.center:hover, .t-btn.center:active { background: #1ed760; }

    .phase {
      margin-top: 4px;
      font-size: 11px;
      letter-spacing: 0.08em;
      opacity: 0.45;
      text-transform: uppercase;
    }
    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #1db954;
      color: #08130c;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: none;
      visibility: hidden;
    }
    .badge.live { visibility: visible; }
    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1db954;
      margin-right: 8px;
      vertical-align: middle;
      transition: opacity 200ms;
      opacity: 0.25;
    }
    .pulse.live { opacity: 1; }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="root">
    <img class="art empty" id="art" alt="">
    <div class="text">
      <div class="title" id="title">Connecting…</div>
      <div class="artist" id="artist"></div>
    </div>
    <div class="upnext empty" id="upnext"><span class="label">Up next</span><span id="upnextText"></span></div>
    <div class="progress">
      <div class="track"><div class="fill" id="fill"></div></div>
      <div class="times"><span id="curTime">0:00</span><span id="totTime">0:00</span></div>
    </div>
    <div class="transport">
      <button class="t-btn" id="prevBtn" type="button" aria-label="Previous track" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 5h2v14H6zM10 12l9-7v14z"/>
        </svg>
      </button>
      <button class="t-btn center" id="toggleBtn" type="button" aria-label="Play" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true" id="toggleIcon">
          <path d="M7 5l13 7-13 7z"/>
        </svg>
      </button>
      <button class="t-btn" id="nextBtn" type="button" aria-label="Next track" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5l9 7-9 7zM16 5h2v14h-2z"/>
        </svg>
      </button>
    </div>
    <div class="phase">
      <span class="pulse" id="pulse"></span><span id="status">media v2 · phase 5</span><span class="badge" id="spotifyBadge">spotify</span>
    </div>
  </div>

  <script type="module">
    // Phase 5 goal: layer in the Spotify polling path. Every 1.5s we now
    // fetch /api/spotify/status alongside SMTC; if authed, we also fetch
    // /api/spotify/playback. Queue is fetched on a slower 6s timer because
    // it doesn't change as often and a fetch round-trip per second was
    // overkill in the original widget.
    //
    // We're testing whether the SECOND fetch path causes flicker even
    // though Phases 1-4 (single fetch path) didn't.

    const HOST = 'http://127.0.0.1:8976';
    const POLL_MS = 1500;
    const TICK_MS = 200;
    const QUEUE_MS = 6000;
    const SEEK_THRESHOLD_FORWARD = 2500;
    const SEEK_THRESHOLD_BACKWARD = 2000;

    const artEl = document.getElementById('art');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const upnextEl = document.getElementById('upnext');
    const upnextTextEl = document.getElementById('upnextText');
    const prevBtn = document.getElementById('prevBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const nextBtn = document.getElementById('nextBtn');
    const toggleIcon = document.getElementById('toggleIcon');
    const fillEl = document.getElementById('fill');
    const curTimeEl = document.getElementById('curTime');
    const totTimeEl = document.getElementById('totTime');
    const pulseEl = document.getElementById('pulse');
    const statusEl = document.getElementById('status');
    const spotifyBadge = document.getElementById('spotifyBadge');

    const PLAY_PATH = 'M7 5l13 7-13 7z';
    const PAUSE_PATH = 'M6 5h4v14H6zM14 5h4v14h-4z';

    let lastTitle = null;
    let lastArtist = null;
    let lastArtVersion = -1;
    let lastHasArt = null;
    let lastIsPlaying = null;
    let lastCanPrev = null;
    let lastCanNext = null;
    let lastCanToggle = null;
    let lastCurTime = null;
    let lastTotTime = null;
    let lastFillRatio = -1;
    let lastSpotifyAuthed = null;
    let lastUpnext = null;
    let pulseTimeout = null;

    let anchorPosMs = 0;
    let anchorAt = 0;
    let durationMs = 0;
    let isPlaying = false;
    let lastTrackKey = '';
    let spotifyAuthed = false;

    const inFlight = { prev: false, toggle: false, next: false };

    function setText(el, value) {
      if (el.textContent !== value) el.textContent = value;
    }

    function setArt(hasArt, version) {
      if (hasArt && version !== lastArtVersion) {
        artEl.src = HOST + '/api/media/album-art?v=' + version;
        lastArtVersion = version;
      }
      if (hasArt !== lastHasArt) {
        artEl.classList.toggle('empty', !hasArt);
        lastHasArt = hasArt;
      }
    }

    function setToggleState(playing, canToggle) {
      if (playing !== lastIsPlaying) {
        toggleIcon.firstElementChild.setAttribute('d', playing ? PAUSE_PATH : PLAY_PATH);
        toggleBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        lastIsPlaying = playing;
      }
      if (canToggle !== lastCanToggle) {
        toggleBtn.disabled = !canToggle;
        lastCanToggle = canToggle;
      }
    }

    function setBtnEnabled(btn, enabled, lastVar) {
      if (enabled !== lastVar) btn.disabled = !enabled;
      return enabled;
    }

    function setSpotifyAuthed(authed) {
      if (authed !== lastSpotifyAuthed) {
        spotifyBadge.classList.toggle('live', authed);
        lastSpotifyAuthed = authed;
      }
    }

    function setUpnext(text) {
      // text === '' means "no next track to show" — hide the row.
      if (text === lastUpnext) return;
      lastUpnext = text;
      if (text) {
        upnextTextEl.textContent = text;
        upnextEl.classList.remove('empty');
      } else {
        upnextEl.classList.add('empty');
      }
    }

    function flashPulse() {
      pulseEl.classList.add('live');
      if (pulseTimeout) clearTimeout(pulseTimeout);
      pulseTimeout = setTimeout(() => pulseEl.classList.remove('live'), 250);
    }

    async function postAction(path, key) {
      if (inFlight[key]) return;
      inFlight[key] = true;
      try {
        await fetch(HOST + path, { method: 'POST' });
      } catch { /* surfaced by next poll's status */ }
      finally { inFlight[key] = false; }
    }

    prevBtn.addEventListener('click', () => postAction('/api/media/previous', 'prev'));
    toggleBtn.addEventListener('click', () => postAction('/api/media/toggle', 'toggle'));
    nextBtn.addEventListener('click', () => postAction('/api/media/next', 'next'));

    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m + ':' + (r < 10 ? '0' : '') + r;
    }

    function currentPosition() {
      if (anchorAt === 0) return 0;
      const elapsed = isPlaying ? Math.max(0, performance.now() - anchorAt) : 0;
      const pos = anchorPosMs + elapsed;
      return durationMs > 0 ? Math.min(pos, durationMs) : pos;
    }

    function tick() {
      const pos = currentPosition();
      const ratio = durationMs > 0 ? pos / durationMs : 0;
      const clamped = Math.max(0, Math.min(1, ratio));
      if (Math.abs(clamped - lastFillRatio) > 0.001) {
        fillEl.style.transform = 'scaleX(' + clamped.toFixed(4) + ')';
        lastFillRatio = clamped;
      }
      const cur = fmtTime(pos);
      const tot = fmtTime(durationMs);
      if (cur !== lastCurTime) { setText(curTimeEl, cur); lastCurTime = cur; }
      if (tot !== lastTotTime) { setText(totTimeEl, tot); lastTotTime = tot; }
    }

    async function pollOnce() {
      try {
        // SMTC + Spotify status fetched in parallel. Status is a tiny JSON
        // (just `{connected, displayName}`) so it's cheap.
        const [npRes, ssRes] = await Promise.all([
          fetch(HOST + '/api/media/now-playing'),
          fetch(HOST + '/api/spotify/status'),
        ]);
        if (!npRes.ok) throw new Error('now-playing HTTP ' + npRes.status);
        if (!ssRes.ok) throw new Error('spotify/status HTTP ' + ssRes.status);
        const np = await npRes.json();
        const ss = await ssRes.json();

        spotifyAuthed = !!ss.connected;
        setSpotifyAuthed(spotifyAuthed);

        // Spotify Web API playback state (cross-device control + extra
        // metadata). Only fetched when authed — saves a round-trip and
        // avoids the host returning EmptyPlayback every 1.5s.
        let spotifyPlayback = null;
        if (spotifyAuthed) {
          try {
            const pbRes = await fetch(HOST + '/api/spotify/playback');
            if (pbRes.ok) spotifyPlayback = await pbRes.json();
          } catch { /* non-fatal — SMTC still drives the main view */ }
        }

        const title = np.hasSession ? (np.title || 'Unknown title') : 'Nothing playing';
        const artist = np.hasSession ? (np.artist || '') : '';
        if (title !== lastTitle) { setText(titleEl, title); lastTitle = title; }
        if (artist !== lastArtist) { setText(artistEl, artist); lastArtist = artist; }
        setArt(!!np.hasArt && !!np.hasSession, np.artVersion ?? 0);

        const playing = np.status === 'Playing';
        isPlaying = playing;
        const canToggle = !!(np.canPlay || np.canPause);
        setToggleState(playing, canToggle);
        lastCanPrev = setBtnEnabled(prevBtn, !!np.canGoPrevious, lastCanPrev);
        lastCanNext = setBtnEnabled(nextBtn, !!np.canGoNext, lastCanNext);

        const serverPos = typeof np.positionMs === 'number' ? np.positionMs : 0;
        durationMs = typeof np.durationMs === 'number' ? np.durationMs : 0;
        const trackKey = (np.title || '') + '|' + (np.artist || '');
        const now = performance.now();
        if (anchorAt === 0 || trackKey !== lastTrackKey) {
          anchorPosMs = serverPos;
          anchorAt = now;
          lastTrackKey = trackKey;
        } else {
          const localExtrap = isPlaying ? anchorPosMs + (now - anchorAt) : anchorPosMs;
          const delta = serverPos - localExtrap;
          if (delta > SEEK_THRESHOLD_FORWARD || delta < -SEEK_THRESHOLD_BACKWARD) {
            anchorPosMs = serverPos;
            anchorAt = now;
          }
        }

        // Mark spotifyPlayback as available so future phases (when we wire
        // up cross-device control) can prefer it. For phase 5 we only use
        // it implicitly via the queue fetch behavior.
        void spotifyPlayback;

        statusEl.classList.remove('err');
        statusEl.textContent = 'media v2 · phase 5';
        flashPulse();
      } catch (e) {
        statusEl.classList.add('err');
        statusEl.textContent = 'host offline · ' + (e.message || 'unknown error');
      }
    }

    async function pollQueue() {
      // Slower cadence than the main poll. Spotify rate-limits hard, and
      // the host caches anyway — but we still don't want to hammer.
      if (!spotifyAuthed) { setUpnext(''); return; }
      try {
        const res = await fetch(HOST + '/api/spotify/queue');
        if (!res.ok) return;
        const queue = await res.json();
        if (Array.isArray(queue) && queue.length > 0) {
          const t = queue[0];
          setUpnext((t.title || '') + (t.artist ? ' — ' + t.artist : ''));
        } else {
          setUpnext('');
        }
      } catch { /* non-fatal */ }
    }

    artEl.addEventListener('error', () => {
      artEl.classList.add('empty');
      lastHasArt = false;
    });

    pollOnce();
    pollQueue();
    setInterval(pollOnce, POLL_MS);
    setInterval(tick, TICK_MS);
    setInterval(pollQueue, QUEUE_MS);
  </script>
</body>
</html>

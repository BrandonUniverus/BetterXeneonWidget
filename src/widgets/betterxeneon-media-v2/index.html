      rootEl.classList.toggle('listening-lyrics',
        listeningMode && optListeningView === 0);
      rootEl.classList.toggle('listening-album',
        listeningMode && optListeningView === 1);
      rootEl.classList.toggle('listening-equalizer',
        listeningMode && optListeningView === 2);
      // Equalizer visibility depends on the same flags — recompute every
      // time the listening state changes so the canvas comes in / drops
      // out as a unit.
      applyEqVisibility();
    }

    function enterListeningMode() {
      if (listeningMode) return;
      listeningMode = true;
      applyListeningMode();
    }

    function exitListeningMode() {
      if (!listeningMode) return;
      listeningMode = false;
      applyListeningMode();
    }

    function bumpActivity() {
      lastActivityAt = performance.now();
      if (listeningMode) exitListeningMode();
    }

    // Any pointer / key / scroll interaction counts as "user is here" and
    // resets the idle timer. passive:true so the listener never blocks the
    // touch/scroll path. Bound at document level so it catches taps on
    // buttons too — tapping a button intentionally exits listening mode
    // and triggers the underlying action in the same gesture.
    for (const ev of ['pointerdown', 'touchstart', 'wheel', 'keydown']) {
      document.addEventListener(ev, bumpActivity, { passive: true });
    }

    // Idle-check tick. Fires every second so the resolution of the
    // autoExpandAfterSec slider isn't ruined. Cheap — just two reads +
    // a subtraction in steady state.
    setInterval(() => {
      if (!optAutoExpand) return;
      if (listeningMode) return;
      // Don't auto-expand if the user is mid-browse (playlists view). They
      // were explicitly looking at something; an ambient takeover here
      // feels rude.
      if (currentView === 'playlists') return;
      // Lyrics submode no longer hides anything — the bottom bar stays
      // visible even when ambient (user preference: controls always
      // reachable). So entering listening mode in lyrics submode is a
      // no-op visually, but we still flip the class for future hooks.
      // Album + equalizer submodes are the real "hide everything else"
      // states.
      const idleSec = (performance.now() - lastActivityAt) / 1000;
      if (idleSec >= optAutoExpandAfterSec) enterListeningMode();
    }, 1000);

    function applyView() {
      const hasLyrics = parsedLyrics.length > 0 && optShowLyrics;
      // 'lyrics' is the implicit default — but if we don't have any to
      // show, the list-view takes over and renders the queue. Tracking
      // 'lyrics' separately from the queue/playlists choice means a
      // track change can reset us back to "show lyrics if you have
      // them" without forgetting that the user previously had us on
      // the queue (we just re-evaluate every track).
      const showList = currentView !== 'lyrics' || !hasLyrics;

      lyricsEl.classList.toggle('hidden', showList);
      listViewEl.classList.toggle('hidden', !showList);

      // Playlists view hides the bottom bar (progress + transport +
      // status) — the user is in "browse mode" and the now-playing chrome
      // is just visual noise. They get back via the back button in the
      // list header. Audio-source view rides the same class — it's a
      // sub-view of playlists and shares the visual treatment.
      rootEl.classList.toggle('playlists-mode',
        currentView === 'playlists' || currentView === 'audio-source');

      // Queue button is redundant when the queue is the visible content
      // (tapping it would toggle to lyrics, but if there are no lyrics
      // we'd be sent right back here — confusing). Hide it in that case.
      // Stays visible when on lyrics, playlists, or audio-source so the
      // user can always jump to queue.
      const queueIsCenter = showList && currentView !== 'playlists' && currentView !== 'audio-source';
      queueBtn.classList.toggle('hidden', queueIsCenter);
      // Active class mirrors the user's explicit choice, not the
      // effective view — a lyrics-less track's auto-fallback shouldn't
      // light the toggle up.
      queueBtn.classList.toggle('active', currentView === 'queue');
      libBtn.classList.toggle('active',
        currentView === 'playlists' || currentView === 'audio-source');
      // Lib button icon depends on currentView (back arrow in playlists
      // view) — re-resolve every time the view changes.
      setLibMode();

      if (!showList) return;
      if (currentView === 'playlists') {
        renderPlaylistsList();
      } else if (currentView === 'audio-source') {
        renderAudioSourceList();
      } else {
        renderQueueList();
      }
    }

    function renderQueueList() {
      const frag = document.createDocumentFragment();

      // Header. Matches the playlists list visually — small title that
      // anchors what the user is looking at without competing for height.
      const header = document.createElement('div');
      header.className = 'list-header';
      const title = document.createElement('div');
      title.className = 'lh-title';
      title.textContent = spotifyQueue.length > 0
        ? 'Up next · ' + spotifyQueue.length
        : 'Up next';
      header.appendChild(title);
      frag.appendChild(header);

      if (spotifyQueue.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'list-empty';
        // Spotify's queue API can return empty for two distinct reasons:
        //   - User genuinely has no queued tracks
        //   - Spotify Connect hasn't activated the device yet (SMTC sees
        //     audio, but Spotify cloud's "active device" slot is empty —
        //     happens on fresh authorize, or when the desktop client
        //     wasn't recently interacted with).
        // We can't reliably tell the two apart from this side, so hint
        // at both with a single message that nudges the user to interact
        // with Spotify if needed.
        empty.textContent = spotifyAuthed
          ? 'Queue is empty. Play something in Spotify — or tap play/pause in the desktop client if it’s already going.'
          : 'Connect Spotify to see the queue';
        frag.appendChild(empty);
      } else {
        for (const t of spotifyQueue) {
          const row = document.createElement('div');
          row.className = 'list-row';
          const img = document.createElement('img');
          img.className = 'lr-art';
          img.alt = '';
          if (t.albumArtUrl) img.src = t.albumArtUrl;
          const meta = document.createElement('div');
          meta.className = 'lr-meta';
          const name = document.createElement('div');
          name.className = 'lr-name';
          name.textContent = t.title || 'Unknown';
          const sub = document.createElement('div');
          sub.className = 'lr-sub';
          sub.textContent = t.artist || '';
          meta.appendChild(name);
          meta.appendChild(sub);
          row.appendChild(img);
          row.appendChild(meta);
          frag.appendChild(row);
        }
      }
      listViewEl.textContent = '';
      listViewEl.appendChild(frag);
    }

    function renderPlaylistsList() {
      const frag = document.createDocumentFragment();

      // Header: just a title now. The way back is the lib button in the
      // bottom-right transport (whose icon swaps to a back arrow while
      // currentView === 'playlists'). Tapping a playlist also auto-snaps
      // back to lyrics, so the header doesn't need its own back chip.
      const header = document.createElement('div');
      header.className = 'list-header';
      const title = document.createElement('div');
      title.className = 'lh-title';
      title.textContent = 'Your playlists';
      header.appendChild(title);
      frag.appendChild(header);

      if (spotifyPlaylists.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'list-empty';
        empty.textContent = spotifyAuthed
          ? 'No playlists found'
          : 'Connect Spotify to see your playlists';
        frag.appendChild(empty);
      } else {
        // Alphabetize. Sort a copy so we don't mutate the stored array
        // (the poller compares state by reference in some places).
        // localeCompare with sensitivity:base + numeric so "Album 2"
        // sorts before "Album 10" and casing doesn't split the list.
        const sorted = spotifyPlaylists.slice().sort((a, b) =>
          (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base', numeric: true }));
        for (const pl of sorted) {
          const row = document.createElement('button');
          row.className = 'list-row';
          row.type = 'button';
          const img = document.createElement('img');
          img.className = 'lr-art';
          img.alt = '';
          // SpotifyPlaylistDto serializes as `imageUrl` (the DTO field
          // is ImageUrl, not AlbumArtUrl like SpotifyQueueItemDto).
          // Falling back to albumArtUrl preserves compatibility if the
          // host DTO is ever realigned.
          const cover = pl.imageUrl || pl.albumArtUrl;
          if (cover) img.src = cover;
          const meta = document.createElement('div');
          meta.className = 'lr-meta';
          const name = document.createElement('div');
          name.className = 'lr-name';
          name.textContent = pl.name || 'Untitled';
          const sub = document.createElement('div');
          sub.className = 'lr-sub';
          sub.textContent = (pl.trackCount || 0) + ' tracks';
          meta.appendChild(name);
          meta.appendChild(sub);
          row.appendChild(img);
          row.appendChild(meta);
          row.addEventListener('click', () => {
            if (pl.id) playPlaylist(pl.id);
            // Snap back to lyrics/queue so the user sees the track
            // they just kicked off, not the playlist list.
            setView('lyrics');
          });
          frag.appendChild(row);
        }
      }
      // Audio source picker entry — always available in the playlists
      // view (auth-independent — the visualizer needs to work whether or
      // not Spotify is connected, and the audio capture device is the
      // user's choice regardless). Tap opens the audio-source sub-view.
      const sourceRow = document.createElement('button');
      sourceRow.className = 'list-row';
      sourceRow.type = 'button';
      sourceRow.style.marginTop = '8px';
      sourceRow.style.borderTop = '1px solid rgba(255,255,255,0.08)';
      sourceRow.style.paddingTop = '12px';
      const srcIcon = document.createElement('div');
      srcIcon.className = 'lr-art';
      srcIcon.style.display = 'flex';
      srcIcon.style.alignItems = 'center';
      srcIcon.style.justifyContent = 'center';
      srcIcon.style.fontSize = '20px';
      srcIcon.textContent = '🔊';
      const srcMeta = document.createElement('div');
      srcMeta.className = 'lr-meta';
      const srcName = document.createElement('div');
      srcName.className = 'lr-name';
      srcName.textContent = 'Equalizer audio source';
      const srcSub = document.createElement('div');
      srcSub.className = 'lr-sub';
      srcSub.textContent = audioSourceActiveName || 'System default';
      srcMeta.appendChild(srcName);
      srcMeta.appendChild(srcSub);
      sourceRow.appendChild(srcIcon);
      sourceRow.appendChild(srcMeta);
      sourceRow.addEventListener('click', () => setView('audio-source'));
      frag.appendChild(sourceRow);

      // Disconnect lives at the bottom of the playlists list — only
      // surfaced when the user is intentionally in the auth-affected
      // view, so it's discoverable without being in the way of the
      // common case (just tapping a playlist).
      if (spotifyAuthed) {
        const disconnect = document.createElement('button');
        disconnect.className = 'list-row';
        disconnect.type = 'button';
        disconnect.style.marginTop = '8px';
        disconnect.style.opacity = '0.65';
        const icon = document.createElement('div');
        icon.className = 'lr-art';
        icon.style.display = 'flex';
        icon.style.alignItems = 'center';
        icon.style.justifyContent = 'center';
        icon.style.fontSize = '18px';
        icon.textContent = '⏻';
        const meta = document.createElement('div');
        meta.className = 'lr-meta';
        const name = document.createElement('div');
        name.className = 'lr-name';
        name.textContent = 'Disconnect Spotify';
        meta.appendChild(name);
        disconnect.appendChild(icon);
        disconnect.appendChild(meta);
        disconnect.addEventListener('click', disconnectSpotify);
        frag.appendChild(disconnect);
      }
      listViewEl.textContent = '';
      listViewEl.appendChild(frag);
    }

    // Renders the audio-source sub-view: list of all active render
    // endpoints, with the configured one highlighted. Tap a row to
    // switch — the host immediately re-points its WASAPI loopback at
    // the new device and persists the choice to %APPDATA% so it
    // survives restarts. Designed for software-mixer setups
    // (SteelSeries Sonar, Voicemeeter) where the Windows-default
    // device isn't the one carrying music.
    function renderAudioSourceList() {
      const frag = document.createDocumentFragment();

      const header = document.createElement('div');
      header.className = 'list-header';
      const title = document.createElement('div');
      title.className = 'lh-title';
      title.textContent = 'Equalizer audio source';
      header.appendChild(title);
      frag.appendChild(header);

      // Always offer "system default" first — a reset path if a saved
      // device is wrong / unavailable. Posting deviceId: null tells the
      // host to clear the override.
      const defaultRow = document.createElement('button');
      defaultRow.className = 'list-row';
      defaultRow.type = 'button';
      const defIcon = document.createElement('div');
      defIcon.className = 'lr-art';
      defIcon.style.display = 'flex';
      defIcon.style.alignItems = 'center';
      defIcon.style.justifyContent = 'center';
      defIcon.style.fontSize = '18px';
      defIcon.textContent = '★';
      const defMeta = document.createElement('div');
      defMeta.className = 'lr-meta';
      const defName = document.createElement('div');
      defName.className = 'lr-name';
      defName.textContent = 'System default';
      const defSub = document.createElement('div');
      defSub.className = 'lr-sub';
      defSub.textContent = 'Follows the Windows playback default';
      defMeta.appendChild(defName);
      defMeta.appendChild(defSub);
      defaultRow.appendChild(defIcon);
      defaultRow.appendChild(defMeta);
      defaultRow.addEventListener('click', () => setAudioSource(null));
      frag.appendChild(defaultRow);

      if (audioSources.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'list-empty';
        empty.textContent = 'No render devices found.';
        frag.appendChild(empty);
      } else {
        for (const d of audioSources) {
          const row = document.createElement('button');
          row.className = 'list-row';
          row.type = 'button';
          const icon = document.createElement('div');
          icon.className = 'lr-art';
          icon.style.display = 'flex';
          icon.style.alignItems = 'center';
          icon.style.justifyContent = 'center';
          icon.style.fontSize = '18px';
          // Currently capturing from this device → checkmark, else
          // empty circle. The checkmark uses the theme accent color so
          // it's visible against any theme.
          if (d.id === audioSourceActiveId) {
            icon.textContent = '✓';
            icon.style.color = 'var(--theme-accent)';
            icon.style.fontWeight = '700';
          } else {
            icon.textContent = '○';
            icon.style.opacity = '0.4';
          }
          const meta = document.createElement('div');
          meta.className = 'lr-meta';
          const name = document.createElement('div');
          name.className = 'lr-name';
          name.textContent = d.name;
          const sub = document.createElement('div');
          sub.className = 'lr-sub';
          sub.textContent = d.isDefault ? 'Windows default' : 'Render endpoint';
          meta.appendChild(name);
          meta.appendChild(sub);
          row.appendChild(icon);
          row.appendChild(meta);
          row.addEventListener('click', () => setAudioSource(d.id));
          frag.appendChild(row);
        }
      }

      listViewEl.textContent = '';
      listViewEl.appendChild(frag);
    }

    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m + ':' + (r < 10 ? '0' : '') + r;
    }

    function currentPosition() {
      if (anchorAt === 0) return 0;
      const elapsed = isPlaying ? Math.max(0, performance.now() - anchorAt) : 0;
      const pos = anchorPosMs + elapsed;
      return durationMs > 0 ? Math.min(pos, durationMs) : pos;
    }

    // --- LRC parser + marker insertion (ported from main) ---------------
    function parseLrc(text) {
      const out = [];
      const stampRe = /\[(\d+):(\d+)(?:\.(\d+))?\]/g;
      for (const raw of text.split('\n')) {
        const stamps = [];
        let lastIdx = 0;
        let m;
        stampRe.lastIndex = 0;
        while ((m = stampRe.exec(raw)) !== null) {
          const minutes = parseInt(m[1], 10);
          const seconds = parseInt(m[2], 10);
          const fracStr = m[3] || '0';
          const frac = fracStr.length === 3 ? parseInt(fracStr, 10) : parseInt(fracStr, 10) * 10;
          stamps.push((minutes * 60 + seconds) * 1000 + frac);
          lastIdx = m.index + m[0].length;
        }
        const lineText = raw.slice(lastIdx).trim();
        if (stamps.length === 0 || !lineText) continue;
        for (const ms of stamps) out.push({ ms, text: lineText });
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }
    function estimateLineDurationMs(text, gapMs) {
      const chars = text.replace(/\s+/g, ' ').trim().length;
      const naive = Math.max(1500, chars * 280);
      return Math.min(naive, Math.max(1500, gapMs * 0.9));
    }
    function isExistingMarker(text) {
      if (/^[\s♪-♯]+$/.test(text)) return true;
      return /^\(?\s*(instrumental|interlude|music|guitar solo|outro|intro)\s*\)?$/i.test(text);
    }
    function addInstrumentalMarkers(lines, songDurationMs) {
      if (lines.length === 0) return lines;
      const NOTE = '♪';
      const SILENCE_THRESHOLD_MS = 8000;
      const SPACING_MS = 8000;
      const LEAD_MS = 1000;
      const TAIL_MS = 1500;
      const out = [];
      const insertGap = (start, end) => {
        if (end - start < SILENCE_THRESHOLD_MS) return;
        let t = start + LEAD_MS;
        while (t + 250 < end - TAIL_MS) {
          out.push({ ms: t, text: NOTE });
          t += SPACING_MS;
        }
      };
      insertGap(0, lines[0].ms);
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        out.push(line);
        const next = lines[i + 1];
        if (!next) {
          if (songDurationMs > 0) {
            const trailingGap = songDurationMs - line.ms;
            const sungEnds = line.ms + estimateLineDurationMs(line.text, trailingGap);
            insertGap(sungEnds, songDurationMs);
          }
          break;
        }
        if (isExistingMarker(line.text) || isExistingMarker(next.text)) continue;
        const gap = next.ms - line.ms;
        const sungEnds = line.ms + estimateLineDurationMs(line.text, gap);
        insertGap(sungEnds, next.ms);
      }
      out.sort((a, b) => a.ms - b.ms);
      return out;
    }

    function clearLyrics() {
      parsedLyrics = [];
      lyricLineEls = [];
      lyricsTrackEl = null;
      currentLineIdx = -1;
      lyricsEl.textContent = '';
      applyView();
    }

    function renderLyrics(lines) {
      const track = document.createElement('div');
      track.className = 'track';
      track.style.transition = 'none';
      lyricLineEls = [];
      for (let i = 0; i < lines.length; i++) {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = lines[i].text;
        track.appendChild(div);
        lyricLineEls.push(div);
      }
      lyricsEl.textContent = '';
      lyricsEl.appendChild(track);
      lyricsTrackEl = track;
      requestAnimationFrame(() => {
        if (lyricsTrackEl === track) track.style.transition = '';
      });
      applyView();
    }

    // Memory cache of LRClib responses keyed by `artist|title`. Stores the
    // raw response object {found, syncedLyrics, ...} — the parseLrc +
    // marker insertion happens at render time because it depends on
    // durationMs which is per-track. ~50 entries cap so a really long
    // session doesn't grow unbounded; LRU eviction by insertion order.
    const lyricsCache = new Map();
    const LYRICS_CACHE_MAX = 50;
    function lyricsCacheKey(artist, title) {
      return (artist || '') + '|' + (title || '');
    }
    function lyricsCachePut(key, value) {
      if (lyricsCache.has(key)) lyricsCache.delete(key);  // re-insert for LRU
      lyricsCache.set(key, value);
      while (lyricsCache.size > LYRICS_CACHE_MAX) {
        const oldest = lyricsCache.keys().next().value;
        lyricsCache.delete(oldest);
      }
    }

    async function loadLyricsResponse(artist, title, album) {
      // Returns the host's /api/lyrics response object (or null on error).
      // Hits memory cache first — only the FIRST request per track pays
      // the network round-trip; prefetch from the queue means by the time
      // a track actually plays, this should already be a cache hit.
      const key = lyricsCacheKey(artist, title);
      if (lyricsCache.has(key)) return lyricsCache.get(key);
      try {
        const url = HOST + '/api/lyrics?artist=' + encodeURIComponent(artist) +
          '&title=' + encodeURIComponent(title) +
          (album ? '&album=' + encodeURIComponent(album) : '');
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        lyricsCachePut(key, data);
        return data;
      } catch {
        return null;
      }
    }

    function prefetchLyricsForQueue() {
      // Fire-and-forget prefetch of the next few queue tracks. Album is
      // omitted because the queue items don't carry it — LRClib's match
      // is fine without it for most cases (artist + title is the primary
      // key); the active-track fetch on track-change still passes album.
      if (!optShowLyrics) return;
      const upcoming = spotifyQueue.slice(0, 5);
      for (const t of upcoming) {
        if (!t.artist || !t.title) continue;
        const key = lyricsCacheKey(t.artist, t.title);
        if (lyricsCache.has(key)) continue;
        // Don't await — we want concurrent fan-out, and we don't care
        // about the result here. The cache fill is the side effect.
        void loadLyricsResponse(t.artist, t.title, '');
      }
    }

    async function fetchLyricsFor(artist, title, album) {
      const key = artist + '|' + title;
      if (key === lyricsFetchKey) return;
      lyricsFetchKey = key;
      clearLyrics();
      // Bail early when the user has lyrics off. We still set
      // lyricsFetchKey above so toggling-on later triggers a fetch via
      // the showLyrics callback (which clears the key for the same
      // track and re-calls fetchLyricsFor). When lyrics are off, the
      // queue auto-fallback in applyView takes over.
      if (!optShowLyrics) { applyView(); return; }
      const data = await loadLyricsResponse(artist, title, album);
      if (key !== lyricsFetchKey) return;        // user changed track mid-fetch
      if (data && data.found && data.syncedLyrics) {
        const raw = parseLrc(data.syncedLyrics);
        parsedLyrics = addInstrumentalMarkers(raw, durationMs);
        renderLyrics(parsedLyrics);
      } else {
        applyView();
      }
    }

    function updateCurrentLine(pos) {
      if (parsedLyrics.length === 0 || !lyricsTrackEl) return;
      // User-tunable offset for residual sync issues — positive value
      // pushes lyrics earlier (use if highlighter feels behind), negative
      // pushes them later. Wired to Behavior > Lyric sync offset.
      const adjustedPos = pos + optLyricSyncOffsetMs;
      let idx = currentLineIdx;
      while (idx + 1 < parsedLyrics.length && parsedLyrics[idx + 1].ms <= adjustedPos) idx++;
      while (idx >= 0 && parsedLyrics[idx].ms > adjustedPos) idx--;
      if (idx === currentLineIdx) return;

      if (currentLineIdx >= 0 && lyricLineEls[currentLineIdx]) {
        lyricLineEls[currentLineIdx].classList.remove('current');
        lyricLineEls[currentLineIdx].classList.add('past');
      }
      if (idx >= 0 && lyricLineEls[idx]) {
        lyricLineEls[idx].classList.remove('past');
        lyricLineEls[idx].classList.add('current');
        const lineEl = lyricLineEls[idx];
        const containerH = lyricsEl.clientHeight;
        const lineCenter = lineEl.offsetTop + lineEl.offsetHeight / 2;
        const offset = containerH / 2 - lineCenter;
        lyricsTrackEl.style.transform = 'translateY(' + offset.toFixed(1) + 'px)';
      }
      currentLineIdx = idx;
    }

    function tick() {
      const pos = currentPosition();
      const ratio = durationMs > 0 ? pos / durationMs : 0;
      const clamped = Math.max(0, Math.min(1, ratio));
      if (Math.abs(clamped - lastFillRatio) > 0.001) {
        fillEl.style.transform = 'scaleX(' + clamped.toFixed(4) + ')';
        lastFillRatio = clamped;
      }
      const cur = fmtTime(pos);
      const tot = fmtTime(durationMs);
      if (cur !== lastCurTime) { setText(curTimeEl, cur); lastCurTime = cur; }
      if (tot !== lastTotTime) { setText(totTimeEl, tot); lastTotTime = tot; }
      updateCurrentLine(pos);
    }

    async function pollOnce() {
      try {
        // No round-trip compensation. The earlier "halfRoundTrip" patch
        // measured (fetchEnd - fetchStart) which includes host-side SMTC
        // calls + two JSON serializations — most of that isn't transit.
        // Adding half of it to the position pushed the highlight 30-60ms
        // ahead of the audio, which feels noticeably worse than the tiny
        // natural lag of doing nothing. v1's behavior was just: anchor
        // serverPos at the moment we received it. Matching that here.
        const [npRes, ssRes] = await Promise.all([
          fetch(HOST + '/api/media/now-playing'),
          fetch(HOST + '/api/spotify/status'),
        ]);
        if (!npRes.ok) throw new Error('now-playing HTTP ' + npRes.status);
        if (!ssRes.ok) throw new Error('spotify/status HTTP ' + ssRes.status);
        const np = await npRes.json();
        const ss = await ssRes.json();
        const fetchEnd = performance.now();

        const wasAuthed = spotifyAuthed;
        spotifyAuthed = !!ss.connected;
        setLibMode();
        // (No /api/spotify/playback poll here.) SMTC already gives us
        // title/artist/album/position/duration/state for the local audio
        // session, and that's all this widget consumes. /me/player was
        // being fetched and thrown away every 1.5s — ~40 Spotify API calls
        // per minute for no rendered output. The endpoint stays available
        // on the host (some future "playing on [Device X]" affordance
        // would want it), but the widget doesn't poll it.

        // Auth flipped — kick the slow Spotify pollers (queue + playlists)
        // immediately on first connect, and stop them on disconnect.
        if (spotifyAuthed && !wasAuthed) {
          pollSpotifyQueue();
          pollSpotifyPlaylists();
        } else if (!spotifyAuthed && wasAuthed) {
          spotifyQueue = [];
          spotifyPlaylists = [];
          setUpnext('');
          // If the user was on the playlists view when auth dropped,
          // bounce them back to lyrics/queue — the playlists view has
          // nothing to show without a token.
          if (currentView === 'playlists') currentView = 'lyrics';
          applyView();
        }

        const title = np.hasSession ? (np.title || 'Unknown title') : 'Nothing playing';
        const artist = np.hasSession ? (np.artist || '') : '';
        if (title !== lastTitle) { setText(titleEl, title); lastTitle = title; }
        if (artist !== lastArtist) { setText(artistEl, artist); lastArtist = artist; }
        // Source line: visible only when Spotify is the SMTC source.
        // (Other sources just don't show this line — title/artist alone is
        // enough for non-Spotify SMTC playback.)
        setSource(!!np.isSpotify && !!np.hasSession, np.album || '');
        setArt(!!np.hasArt && !!np.hasSession, np.artVersion ?? 0);

        const playing = np.status === 'Playing';
        isPlaying = playing;
        const canToggle = !!(np.canPlay || np.canPause);
        setToggleState(playing, canToggle);
        lastCanPrev = setBtnEnabled(prevBtn, !!np.canGoPrevious, lastCanPrev);
        lastCanNext = setBtnEnabled(nextBtn, !!np.canGoNext, lastCanNext);

        // Position anchor. Use serverPos as-is and anchor it at fetchEnd
        // (the moment we received the response).
        // Then apply a small constant slowdown — SMTC + Windows audio
        // pipeline + speaker buffer typically adds ~30ms of latency between
        // "where the file pointer is" and "what the listener hears". Without
        // compensation the highlighter feels a hair too eager. Sign matters:
        // this SUBTRACTS from the position so lyric lines hit later, which
        // is the opposite direction from the old halfRoundTrip patch (that
        // one added to the position and made lyrics earlier — wrong fix).
        // The iCUE Lyric sync offset slider stacks on top for per-song tuning.
        const PERCEPTUAL_LAG_MS = 30;
        const rawPos = typeof np.positionMs === 'number' ? np.positionMs : 0;
        const serverPos = rawPos - PERCEPTUAL_LAG_MS;
        durationMs = typeof np.durationMs === 'number' ? np.durationMs : 0;
        const trackKey = (np.title || '') + '|' + (np.artist || '');
        const now = fetchEnd;
        const trackChanged = trackKey !== lastTrackKey;
        if (anchorAt === 0 || trackChanged) {
          anchorPosMs = serverPos;
          anchorAt = now;
          lastTrackKey = trackKey;
        } else {
          const localExtrap = isPlaying ? anchorPosMs + (now - anchorAt) : anchorPosMs;
          const delta = serverPos - localExtrap;
          if (delta > SEEK_THRESHOLD_FORWARD || delta < -SEEK_THRESHOLD_BACKWARD) {
            anchorPosMs = serverPos;
            anchorAt = now;
          }
        }

        // Track current metadata for the showLyrics toggle handler — it
        // needs to fetch lyrics for the *currently-playing* track when
        // the user flips the option on, without waiting for a track
        // change.
        currentArtist = artist;
        currentTitle = title;
        currentAlbum = np.album || '';

        // Track change resets the user out of any explicit
        // queue/playlists view back to lyrics — feels jarring if the
        // queue stays up after the next-track-up has finished and is
        // now actually playing.
        if (trackChanged && currentView !== 'lyrics') {
          currentView = 'lyrics';
        }
        if (trackChanged && np.hasSession && artist && title) {
          fetchLyricsFor(artist, title, np.album || '');
        } else if (!np.hasSession) {
          clearLyrics();
          currentArtist = '';
          currentTitle = '';
          currentAlbum = '';
        }

        statusEl.classList.remove('err');
        statusEl.textContent = 'media v2';
        flashPulse();
      } catch (e) {
        statusEl.classList.add('err');
        statusEl.textContent = 'host offline · ' + (e.message || 'unknown error');
      }
    }

    artEl.addEventListener('error', () => {
      artEl.classList.add('empty');
      lastHasArt = false;
      // No cover → fall back to default green palette for the EQ.
      deriveEqColors(null);
      // Album theme also re-syncs to the default green accent.
      if (optTheme === 0) applyTheme();
    });
    // On every album-art change, re-derive the equalizer's two-tone
    // gradient from the new cover. extractDominantColor uses 32×32 of
    // pixel data which is cheap (~30µs) so doing it on every load is
    // fine. CORS lets the canvas read the cross-origin host response.
    // For the Album theme, also refresh the global accent so the play
    // button / progress fill / current lyric color all shift with the
    // new cover.
    artEl.addEventListener('load', () => {
      updateEqColorsFromArt();
      if (optTheme === 0) applyTheme();
    });

    // Register Behavior options. The handler fires once at registration
    // with the initial value, then again any time pollIcueOptions
    // detects a change.
    registerIcueOption('pollIntervalMs', 1500, value => {
      const n = Number(value);
      pollIntervalMs = Number.isFinite(n) ? Math.max(500, Math.min(5000, n)) : 1500;
      // Restart the interval so the new cadence takes effect immediately
      // rather than waiting up to the OLD interval first.
      if (pollTimer) startPollTimer();
    });
    registerIcueOption('autoExpand', true, value => {
      optAutoExpand = value !== false;
    });
    registerIcueOption('autoExpandAfterSec', 30, value => {
      const n = Number(value);
      optAutoExpandAfterSec = Number.isFinite(n) ? n : 30;
    });
    registerIcueOption('showLyrics', true, value => {
      optShowLyrics = value !== false;
      if (!optShowLyrics) {
        // Toggling off: clear the rendered lyric list and drop the
        // fetch key so re-enabling later triggers a fresh fetch on
        // the same track. clearLyrics → applyView falls through to
        // the queue list automatically.
        clearLyrics();
        lyricsFetchKey = '';
      } else {
        // Toggling on: drop the fetch key AND fetch directly for the
        // currently-playing track. Without the direct fetch, we'd wait
        // for the next track change before lyrics reappeared.
        lyricsFetchKey = '';
        if (currentArtist && currentTitle) {
          fetchLyricsFor(currentArtist, currentTitle, currentAlbum);
        } else {
          // No active track to fetch for — but we still need to
          // re-evaluate the view so any visible queue stays consistent.
          applyView();
        }
      }
    });
    registerIcueOption('lyricSyncOffsetMs', 0, value => {
      const n = Number(value);
      optLyricSyncOffsetMs = Number.isFinite(n) ? n : 0;
    });
    registerIcueOption('listeningView', 0, value => {
      const n = Number(value);
      optListeningView = Number.isFinite(n) ? Math.max(0, Math.min(2, Math.round(n))) : 0;
      // Re-apply if we're currently in listening mode so the user sees the
      // submode change immediately without having to wait for idle to flip.
      if (listeningMode) applyListeningMode();
      // EQ visibility tracks listeningView even outside listening mode (so
      // toggling the option mid-session still produces the right canvas
      // state — most notably, dropping the EQ stream when leaving submode 2).
      applyEqVisibility();
    });
    registerIcueOption('eqBackground', false, value => {
      optEqBackground = value === true || value === 'true';
      applyEqVisibility();
    });
    registerIcueOption('theme', 0, value => {
      const n = Number(value);
      optTheme = Number.isFinite(n) ? Math.max(0, Math.min(5, Math.round(n))) : 0;
      applyTheme();
    });
    registerIcueOption('eqShowAlbumArt', false, value => {
      optEqShowAlbumArt = value === true || value === 'true';
      applyEqVisibility();
    });

    pollOnce();
    startPollTimer();
    setInterval(tick, TICK_MS);
    // Slow Spotify pollers — separate cadences from the main 1.5s poll.
    // Queue refreshes 6s; playlists every 10 min (host caches 30 min,
    // and Spotify rate-limits /me/playlists hard if hammered).
    queueTimer = setInterval(pollSpotifyQueue, SPOTIFY_QUEUE_MS);
    playlistsTimer = setInterval(pollSpotifyPlaylists, SPOTIFY_PLAYLISTS_MS);
  </script>
</body>
</html>
